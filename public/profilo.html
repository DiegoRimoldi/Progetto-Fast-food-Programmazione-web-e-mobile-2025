<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Gestione Profilo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/responsive.css">
  <link rel="stylesheet" href="assets/modern-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    .main-content {
      flex: 1;
      padding: 2rem;
    }

    .form-container {
      max-width: 760px;
      margin: auto;
    }

    .profile-card {
      border: 1px solid #e9ecef;
      border-radius: 1rem;
      box-shadow: 0 0.35rem 1rem rgba(0, 0, 0, 0.05);
      margin-bottom: 1rem;
    }

    .profile-card .card-header {
      background: #fff;
      border-bottom: 1px solid #f1f3f5;
      font-weight: 600;
    }

    .custom-alert {
      border-radius: 0.85rem;
      border: 1px solid transparent;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      font-size: 0.95rem;
      box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.06);
      animation: fadeIn 0.2s ease-out;
    }

    .custom-alert-icon {
      font-size: 1.1rem;
      line-height: 1.2;
    }

    .custom-alert-title {
      font-weight: 600;
      margin-bottom: 0.1rem;
    }

    .custom-alert-success {
      background-color: #f1fff5;
      border-color: #b7ebc6;
      color: #176f36;
    }

    .custom-alert-danger {
      background-color: #fff5f5;
      border-color: #fecaca;
      color: #8b1a1a;
    }

    .custom-alert-warning {
      background-color: #fffaf0;
      border-color: #f9d9a0;
      color: #8a5200;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <script src="assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticated();
  </script>

  <div class="main-content">
    <h2 class="mb-3">Gestisci Profilo</h2>
    <div class="form-container">
      <button class="btn btn-secondary mb-3" onclick="goBack()">
        ← Torna Indietro
      </button>

      <div class="card profile-card">
        <div class="card-header">Dati Profilo</div>
        <div class="card-body">
          <form id="profileForm">
            <div class="mb-3">
              <label for="username" class="form-label">Username *</label>
              <input type="text" id="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email *</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="numero_di_telefono" class="form-label">Numero di Telefono *</label>
              <input type="text" id="numero_di_telefono" class="form-control" required>
            </div>

            <div id="campiCliente" style="display: none;">
              <div class="mb-3">
                <label for="indirizzo" class="form-label">Indirizzo</label>
                <textarea id="indirizzo" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label for="metodo_pagamento" class="form-label">Metodo di Pagamento</label>
                <input type="text" id="metodo_pagamento" class="form-control">
              </div>
            </div>

            <div id="campiRistoratore" style="display: none;">
              <div class="mb-3">
                <label for="piva" class="form-label">Partita IVA *</label>
                <input type="text" id="piva" class="form-control">
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Aggiorna Profilo</button>
          </form>
        </div>
      </div>

      <div class="card profile-card">
        <div class="card-header">Sicurezza Account</div>
        <div class="card-body">
          <form id="passwordForm">
            <div class="mb-3">
              <label for="oldPassword" class="form-label">Vecchia Password *</label>
              <input type="password" id="oldPassword" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="newPassword" class="form-label">Nuova Password *</label>
              <input type="password" id="newPassword" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning">Modifica Password</button>
          </form>
        </div>
      </div>

      <div class="card profile-card border-danger">
        <div class="card-header text-danger">Area Pericolosa</div>
        <div class="card-body">
          <p class="mb-3 text-muted">Questa azione eliminerà definitivamente il tuo profilo.</p>
          <button id="deleteBtn" class="btn btn-danger">Elimina Profilo</button>
        </div>
      </div>

      <div id="message" class="mt-3"></div>
    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.handleAuthIssue("utente non autenticato");
      }
    }

    function mostraAlertPersonalizzato(type, title, text) {
      var messageBox = document.getElementById("message");
      var icon = "ℹ️";

      if (type === "success") icon = "✅";
      if (type === "danger") icon = "❌";
      if (type === "warning") icon = "⚠️";

      messageBox.innerHTML =
        '<div class="custom-alert custom-alert-' + type + '">' +
          '<div class="custom-alert-icon">' + icon + '</div>' +
          '<div>' +
            '<div class="custom-alert-title">' + title + '</div>' +
            '<div>' + text + '</div>' +
          '</div>' +
        '</div>';
    }

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) {
          window.handleAuthIssue("sessione non valida");
        }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    async function caricaDatiProfilo() {
      try {
        var response = await fetchConControlloToken(apiBase + "/users/me", {
          method: "GET",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token }
        });

        var profile = await response.json();
        if (!profile) return;

        document.getElementById("username").value = profile.username;
        document.getElementById("email").value = profile.email;
        document.getElementById("numero_di_telefono").value = profile.numero_di_telefono;

        if (profile.role === "cliente") {
          document.getElementById("indirizzo").value = profile.indirizzo;
          document.getElementById("metodo_pagamento").value = profile.metodo_pagamento;
          document.getElementById("campiCliente").style.display = "block";
        }

        if (profile.role === "ristoratore") {
          document.getElementById("piva").value = profile.piva;
          document.getElementById("campiRistoratore").style.display = "block";
        }

        document.getElementById("profileForm").addEventListener("submit", async function(e) {
          e.preventDefault();

          var payload = {
            username: document.getElementById("username").value.trim(),
            email: document.getElementById("email").value.trim(),
            numero_di_telefono: document.getElementById("numero_di_telefono").value.trim()
          };

          if (profile.role === "cliente") {
            payload.indirizzo = document.getElementById("indirizzo").value.trim();
            payload.metodo_pagamento = document.getElementById("metodo_pagamento").value.trim();
          }

          if (profile.role === "ristoratore") {
            payload.piva = document.getElementById("piva").value.trim();
          }

          try {
            var updateRes = await fetchConControlloToken(apiBase + "/users/me", {
              method: "PUT",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify(payload)
            });

            if (!updateRes.ok) {
              var errorText = await updateRes.text();
              throw new Error(errorText);
            }

            mostraAlertPersonalizzato("success", "Aggiorna Profilo", "Profilo aggiornato con successo!");
          } catch (err) {
            mostraAlertPersonalizzato("danger", "Aggiorna Profilo", err.message);
          }
        });

        document.getElementById("passwordForm").addEventListener("submit", async function(e) {
          e.preventDefault();

          var oldPassword = document.getElementById("oldPassword").value.trim();
          var newPassword = document.getElementById("newPassword").value.trim();

          if (!oldPassword || !newPassword) {
            mostraAlertPersonalizzato("warning", "Modifica Password", "Inserisci entrambe le password.");
            return;
          }

          try {
            var response = await fetchConControlloToken(apiBase + "/users/me/password", {
              method: "PUT",
              headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
              body: JSON.stringify({ oldPassword, newPassword })
            });

            var result = await response.json();

            if (!response.ok) {
              throw new Error(result.error);
            }

            mostraAlertPersonalizzato("success", "Modifica Password", "Password aggiornata con successo!");
            document.getElementById("passwordForm").reset();
          } catch (err) {
            mostraAlertPersonalizzato("danger", "Modifica Password", err.message);
          }
        });

        document.getElementById("deleteBtn").addEventListener("click", async function() {
          var confermaEliminazione = window.confirm("Sei sicuro di voler eliminare definitivamente il tuo profilo?");

          if (!confermaEliminazione) {
            mostraAlertPersonalizzato("warning", "Elimina Profilo", "Eliminazione annullata.");
            return;
          }

          try {
            var delRes = await fetchConControlloToken(apiBase + "/users/" + profile._id, {
              method: "DELETE",
              headers: { "Authorization": "Bearer " + token }
            });

            if (!delRes.ok) {
              var delError = await delRes.text();
              throw new Error(delError);
            }

            mostraAlertPersonalizzato("success", "Elimina Profilo", "Profilo eliminato con successo. Verrai disconnesso.");

            setTimeout(function() {
              window.handleAuthIssue("sessione non valida");
            }, 900);
          } catch (err) {
            mostraAlertPersonalizzato("danger", "Elimina Profilo", err.message);
          }
        });

      } catch (err) {
        console.error("Errore nel caricamento del profilo:", err);
      }
    }

    caricaDatiProfilo();
  </script>
</body>
</html>
