<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Gestione Profilo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="assets/responsive.css">
  <link rel="stylesheet" href="assets/modern-theme.css">

  <style>
    :root {
      --profile-gradient: linear-gradient(135deg, #0d6efd 0%, #0dcaf0 100%);
      --profile-text-soft: #6c757d;
      --profile-border: #eef1f5;
    }

    body {
      margin: 0;
      padding: 0;
      background: radial-gradient(circle at top, #eef6ff 0%, #f8fbff 40%, #f3f7fc 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .main-content {
      padding: 2.25rem 1.25rem;
    }

    .form-container {
      max-width: 820px;
      margin: auto;
    }

    .profile-hero {
      background: var(--profile-gradient);
      color: #fff;
      border-radius: 1.25rem;
      padding: 1.4rem;
      margin-bottom: 1rem;
      box-shadow: 0 16px 28px rgba(13, 110, 253, 0.25);
    }

    .profile-hero p {
      margin: 0;
      opacity: 0.92;
    }

    .profile-card {
      border: 1px solid var(--profile-border);
      border-radius: 1.1rem;
      box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
      margin-bottom: 1rem;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .profile-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.12);
    }

    .profile-card .card-header {
      background: #fff;
      border-bottom: 1px solid #f1f3f5;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.9rem 1.25rem;
      color: #1f3b64;
    }

    .card-icon {
      width: 2rem;
      height: 2rem;
      border-radius: 0.65rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.95rem;
      background: var(--profile-gradient);
      font-weight: 700;
      flex-shrink: 0;
    }

    .card-icon.warning {
      background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
    }

    .card-icon.danger {
      background: linear-gradient(135deg, #1d4ed8 0%, #2563eb 100%);
    }

    .card-subtitle {
      color: var(--profile-text-soft);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .btn-back {
      border-radius: 0.75rem;
      padding: 0.55rem 0.95rem;
      margin-bottom: 0.95rem;
    }

    @media (min-width: 768px) {
      .main-content {
        padding: 2.5rem;
      }
    }
  </style>

  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <script src="assets/auth.js"></script>
</head>

<body>
  <script>
    window.ensureAuthenticated();
  </script>

  <div class="main-content">
    <div class="form-container">

      <button class="btn btn-secondary btn-back" onclick="goBack()">
        ← Torna Indietro
      </button>

      <section class="profile-hero">
        <h2 class="mb-2">Gestisci Profilo</h2>
      </section>

      <!-- DATI PROFILO -->
      <div class="card profile-card">
        <div class="card-header">
          <span class="card-icon"><i class="bi bi-person-badge-fill"></i></span>
          Dati Profilo
        </div>
        <div class="card-body">

          <p class="card-subtitle">Aggiorna le informazioni principali del tuo account.</p>

          <form id="profileForm">
            <div class="mb-3">
              <label for="username" class="form-label">Username *</label>
              <input type="text" id="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email *</label>
              <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="numero_di_telefono" class="form-label">Numero di Telefono *</label>
              <input type="text" id="numero_di_telefono" class="form-control" required>
            </div>

            <div id="campiCliente" style="display: none;">
              <div class="mb-3">
                <label for="indirizzo" class="form-label">Indirizzo</label>
                <textarea id="indirizzo" class="form-control" rows="3"></textarea>
              </div>

              <div class="mb-3">
                <label for="metodo_pagamento" class="form-label">Metodo di Pagamento</label>
                <input type="text" id="metodo_pagamento" class="form-control">
              </div>
            </div>

            <div id="campiRistoratore" style="display: none;">
              <div class="mb-3">
                <label for="piva" class="form-label">Partita IVA *</label>
                <input type="text" id="piva" class="form-control">
              </div>
            </div>

            <button type="submit" class="btn btn-primary">Aggiorna Profilo</button>
          </form>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="card profile-card">
        <div class="card-header">
          <span class="card-icon warning"><i class="bi bi-shield-lock-fill"></i></span>
          Sicurezza Profilo
        </div>
        <div class="card-body">

          <p class="card-subtitle">Mantieni il tuo account protetto con una password aggiornata.</p>

          <form id="passwordForm">
            <div class="mb-3">
              <label for="oldPassword" class="form-label">Vecchia Password *</label>
              <input type="password" id="oldPassword" class="form-control" required>
            </div>

            <div class="mb-3">
              <label for="newPassword" class="form-label">Nuova Password *</label>
              <input type="password" id="newPassword" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Modifica Password</button>
          </form>
        </div>
      </div>

      <!-- ELIMINAZIONE -->
      <div class="card profile-card border-primary-subtle">
        <div class="card-header text-primary">
          <span class="card-icon danger"><i class="bi bi-trash3-fill"></i></span>
          Eliminazione Profilo
        </div>
        <div class="card-body">
          <p class="card-subtitle">Questa azione eliminerà definitivamente il tuo profilo e i dati associati.</p>
          <button id="deleteBtn" type="button" class="btn btn-danger">Elimina Profilo</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");
    var userId = localStorage.getItem("userId");

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.handleAuthIssue("utente non autenticato");
      }
    }

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) {
          window.handleAuthIssue("sessione non valida");
        }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    function mostraMessaggio(testo, tipo) {
      alert(testo);
      if (tipo === "errore") {
        console.error(testo);
      } else {
        console.log(testo);
      }
    }

    async function caricaDatiProfilo() {
      try {
        var response = await fetchConControlloToken(apiBase + "/users/me", {
          method: "GET",
          headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token }
        });

        if (!response || !response.ok) {
          return;
        }

        var profile = await response.json();
        if (!profile) return;

        userId = profile._id || userId;
        if (userId) {
          localStorage.setItem("userId", userId);
        }

        document.getElementById("username").value = profile.username;
        document.getElementById("email").value = profile.email;
        document.getElementById("numero_di_telefono").value = profile.numero_di_telefono;

        if (profile.role === "cliente") {
          document.getElementById("indirizzo").value = profile.indirizzo;
          document.getElementById("metodo_pagamento").value = profile.metodo_pagamento;
          document.getElementById("campiCliente").style.display = "block";
        }

        if (profile.role === "ristoratore") {
          document.getElementById("piva").value = profile.piva;
          document.getElementById("campiRistoratore").style.display = "block";
        }

      } catch (err) {
        console.error("Errore nel caricamento del profilo:", err);
      }
    }

    document.getElementById("profileForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      var payload = {
        username: document.getElementById("username").value.trim(),
        email: document.getElementById("email").value.trim(),
        numero_di_telefono: document.getElementById("numero_di_telefono").value.trim()
      };

      var campiClienteVisibili = document.getElementById("campiCliente").style.display === "block";
      var campiRistoratoreVisibili = document.getElementById("campiRistoratore").style.display === "block";

      if (campiClienteVisibili) {
        payload.indirizzo = document.getElementById("indirizzo").value.trim();
        payload.metodo_pagamento = document.getElementById("metodo_pagamento").value.trim();
      }

      if (campiRistoratoreVisibili) {
        payload.piva = document.getElementById("piva").value.trim();
      }

      try {
        var response = await fetchConControlloToken(apiBase + "/users/me", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response) return;

        var data = await response.json();
        if (!response.ok) {
          mostraMessaggio(data.error || "Errore durante l'aggiornamento del profilo.", "errore");
          return;
        }

        mostraMessaggio("Profilo aggiornato con successo.", "successo");
      } catch (err) {
        mostraMessaggio("Errore di rete durante l'aggiornamento del profilo.", "errore");
      }
    });

    document.getElementById("passwordForm").addEventListener("submit", async function (event) {
      event.preventDefault();

      var oldPassword = document.getElementById("oldPassword").value;
      var newPassword = document.getElementById("newPassword").value;

      if (!oldPassword || !newPassword) {
        mostraMessaggio("Compila tutti i campi della password.", "errore");
        return;
      }

      try {
        var response = await fetchConControlloToken(apiBase + "/users/me/password", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ oldPassword: oldPassword, newPassword: newPassword })
        });

        if (!response) return;

        var data = await response.json();
        if (!response.ok) {
          mostraMessaggio(data.error || "Errore durante la modifica della password.", "errore");
          return;
        }

        document.getElementById("passwordForm").reset();
        mostraMessaggio("Password modificata con successo.", "successo");
      } catch (err) {
        mostraMessaggio("Errore di rete durante la modifica della password.", "errore");
      }
    });

    document.getElementById("deleteBtn").addEventListener("click", async function () {
      if (!userId) {
        mostraMessaggio("ID utente non disponibile. Ricarica la pagina.", "errore");
        return;
      }

      var conferma = confirm("Sei sicuro di voler eliminare definitivamente il tuo profilo?");
      if (!conferma) {
        return;
      }

      try {
        var response = await fetchConControlloToken(apiBase + "/users/" + userId, {
          method: "DELETE",
          headers: { "Content-Type": "application/json" }
        });

        if (!response) return;

        var data = await response.json();
        if (!response.ok) {
          mostraMessaggio(data.error || "Errore durante l'eliminazione del profilo.", "errore");
          return;
        }

        localStorage.removeItem("token");
        localStorage.removeItem("userId");
        localStorage.removeItem("role");
        mostraMessaggio("Profilo eliminato correttamente.", "successo");
        window.location.href = "/index.html";
      } catch (err) {
        mostraMessaggio("Errore di rete durante l'eliminazione del profilo.", "errore");
      }
    });

    caricaDatiProfilo();
  </script>
</body>
</html>
