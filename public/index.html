<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/responsive.css">
  <link rel="stylesheet" href="assets/modern-theme.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/Favicon.png">

  <style>
    body {
      background-color: #fecd4c;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 60px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 52px;
      width: auto;
      display: block;
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #00B5A2;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0, 181, 162, 0.18);
      line-height: 1;
    }

    .hero {
      min-height: calc(100vh - 110px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px 36px;
      flex-wrap: wrap;
      gap: 24px;
    }

    .hero-text {
      max-width: 560px;
    }

    .hero-text h1 {
      font-size: clamp(2rem, 4vw, 2.6rem);
      font-weight: 800;
      color: #1e1e1e;
      margin-bottom: 0.65rem;
    }

    .hero-text p {
      font-size: clamp(1rem, 2vw, 1.12rem);
      margin-top: 10px;
      color: #333;
      margin-bottom: 1rem;
    }

    .hero-img {
      max-width: min(420px, 38vw);
    }

    .btn-custom {
      background-color: #0d6efd;
      color: white;
      padding: 10px 22px;
      font-weight: 600;
      border-radius: 30px;
      margin-right: 12px;
      margin-top: 8px;
    }

    .btn-custom:hover {
      background-color: #0b5ed7;
      color: white;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .logo img {
      height: 52px;
      width: auto;
      display: block;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 48px 10px;
      min-height: 96px;
    }
  </style>
</head>

<body>

  <header>
    <a href="index.html" class="logo" aria-label="FastFood">
      <img src="assets/Favicon.png" alt="FastFood">
    </a>
    <div>
      <a href="login.html" class="btn btn-custom">Login</a>
      <a href="register.html" class="btn btn-custom">Registrati</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>Il tuo fast food preferito, sempre a portata di click.</h1>
      <p>Ordina in pochi secondi e ricevi tutto caldo, fresco e puntuale.</p>
      <a href="login.html" class="btn btn-custom">Inizia ora</a>
    </div>

    <div class="hero-img">
      <img src="assets/logo.png" alt="FastFood Logo" class="img-fluid">
    </div>
  </section>

</body>
</html>
