<!--
  Pagina dell'interfaccia utente del progetto Fast Food.
  Questa vista contiene struttura HTML, sezioni funzionali e hook (id/class)
  utilizzati da CSS e JavaScript per rendering dinamico e interazioni.
-->

<!DOCTYPE html>
<html lang="it">
<!-- SEZIONE HEAD: Metadati, titolo pagina e collegamento a stili/librerie. -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Logout</title>
  <link rel="icon" type="image/png" href="assets/Favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/modern-theme.css">
</head>
<!-- SEZIONE BODY: Struttura visiva e contenuti interattivi della pagina. -->
<body>
  <script>
   [
     "token",
     "role",
     "userId",
     "token_cliente",
     "token_ristoratore",
     "userId_cliente",
     "userId_ristoratore"
   ].forEach(function(key) {
     localStorage.removeItem(key);
   });

   sessionStorage.removeItem("lastVisitedPath");
   window.location.replace("login.html");
</script>
<!-- SEZIONE SCRIPT: Script client per API call, eventi UI e logica dinamica. -->
</body>
</html>
