<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Crea Ristorante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    :root {
      --brand-primary: #0d6efd;
      --brand-accent: #fecd4c;
      --surface: #ffffff;
      --muted: #6c757d;
      --text: #1f2937;
    }

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f3f8ff 0%, #eefbf8 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: clamp(190px, 22vw, 250px);
      flex: 0 0 clamp(190px, 22vw, 250px);
      background: var(--surface);
      border-right: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 2px 0 20px rgba(15, 23, 42, 0.08);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.08));
    }
    .sidebar a.nav-link {
      color: #4b5563;
      padding: 0.72rem 0.9rem;
      border-radius: 0.75rem;
      margin-bottom: 0.4rem;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .sidebar a.nav-link.active {
      background: linear-gradient(120deg, var(--brand-primary) 0%, #6ea8fe 100%);
      color: #fff;
      transform: translateX(2px);
      box-shadow: 0 6px 14px rgba(13, 110, 253, 0.28);
    }
    .sidebar a.nav-link:hover {
      background: linear-gradient(120deg, #0b5ed7 0%, #3d8bfd 100%);
      color: #fff;
      transform: translateX(2px);
      box-shadow: 0 6px 14px rgba(13, 110, 253, 0.22);
    }
    .main-content {
      flex: 1;
      padding: clamp(1.25rem, 2.5vw, 2.25rem);
    }

    .page-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero-card {
      border: none;
      border-radius: 1rem;
      background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    .hero-title {
      color: var(--brand-primary);
      margin-bottom: 0.25rem;
      font-weight: 700;
    }

    .hero-subtitle {
      color: var(--muted);
      margin-bottom: 0;
    }

    .form-card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .form-card .card-header {
      background: linear-gradient(120deg, #0d6efd 0%, #6ea8fe 100%);
      color: #fff;
      border-bottom: none;
      padding: 1rem 1.25rem;
      font-weight: 600;
    }

    .form-card .card-body {
      padding: 1.25rem;
      background: #fff;
    }

    .form-label {
      font-weight: 600;
      color: #374151;
    }

    .form-control {
      border-radius: 0.7rem;
      border: 1px solid #d7dde7;
      padding: 0.62rem 0.78rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-control:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 0.18rem rgba(13, 110, 253, 0.16);
    }

    .btn-create {
      background: linear-gradient(120deg, #0d6efd 0%, #6ea8fe 100%);
      color: #fff;
      border: none;
      border-radius: 0.72rem;
      font-weight: 600;
      padding: 0.6rem 1rem;
    }

    .btn-create:hover {
      background: linear-gradient(120deg, #0b5ed7 0%, #3d8bfd 100%);
      color: #fff;
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("ristoratore");
  </script>

<div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
    <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
    <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
    <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="statistiche.html" class="nav-link">Statistiche</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

    <div class="main-content">
    <div class="page-shell">
      <div class="card hero-card mb-4">
        <div class="card-body p-4">
          <h2 class="hero-title h3">Crea il tuo ristorante</h2>
          <p class="hero-subtitle">Inserisci i dati principali del locale per pubblicarlo sulla piattaforma.</p>
        </div>
      </div>

      <div class="card form-card">
        <div class="card-header">Informazioni ristorante</div>
        <div class="card-body">
          <form id="restaurantForm">
            <div class="mb-3">
              <label for="name" class="form-label">Nome del Ristorante *</label>
              <input type="text" id="name" class="form-control" placeholder="Es. Pizzeria Napoli Centro" required>
            </div>
            <div class="mb-3">
              <label for="address" class="form-label">Indirizzo *</label>
              <input type="text" id="address" class="form-control" placeholder="Es. Via Roma 24, 80138 Napoli (NA)" required>
            </div>
            <div class="mb-3">
              <label for="numero_di_telefono" class="form-label">Numero di Telefono *</label>
              <input type="tel" id="numero_di_telefono" class="form-control" placeholder="Es. +39 081 123 4567" required>
            </div>
            <div class="mb-3">
              <label for="piva" class="form-label">Partita IVA</label>
              <input type="text" id="piva" class="form-control" placeholder="Es. 12345678901">
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Descrizione</label>
              <textarea id="description" class="form-control" rows="3" placeholder="Es. Burger gourmet, opzioni vegetariane e consegna veloce in centro città."></textarea>
            </div>
            <div class="mb-3">
              <label for="image" class="form-label">URL Immagine</label>
              <input type="url" id="image" class="form-control" placeholder="Es. https://images.example.com/ristoranti/pizzeria-napoli.jpg">
            </div>
            <button type="submit" class="btn btn-create">Crea Ristorante</button>
          </form>
          <div id="message" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");
    var userId = localStorage.getItem("userId");

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) { // token scaduto o invalido
            window.handleAuthIssue("sessione non valida");
          }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    var restaurantForm = document.getElementById("restaurantForm");
    restaurantForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      var name = document.getElementById("name").value.trim();
      var address = document.getElementById("address").value.trim();
      var numeroDiTelefono = document.getElementById("numero_di_telefono").value.trim();
      var piva = document.getElementById("piva").value.trim();
      var description = document.getElementById("description").value.trim();
      var image = document.getElementById("image").value.trim();

      if (!name || !address || !numeroDiTelefono) {
        document.getElementById("message").innerHTML = '<div class="alert alert-danger">Nome, indirizzo e numero di telefono sono obbligatori.</div>';
        return;
      }

      var payload = {
        name: name,
        address: address,
        numero_di_telefono: numeroDiTelefono,
        piva: piva,
        description: description,
        image: image,
        ristoratore_id: userId,
      };

      try {
        var response = await fetchConControlloToken(apiBase + "/restaurants", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(payload)
        });
        if (!response) {
          throw new Error("Nessuna risposta dal server");
        }
        var data = await response.json();
        if (!response.ok) {
          document.getElementById("message").innerHTML = '<div class="alert alert-danger">' + (data.error || "Errore nella creazione del ristorante") + '</div>';
          return;
        }
        document.getElementById("message").innerHTML = '<div class="alert alert-success">Ristorante creato con successo!</div>';
        setTimeout(function() {
          window.location.href = "home.html";
        }, 2000);
      } catch (err) {
        console.error("Errore:", err);
        document.getElementById("message").innerHTML = '<div class="alert alert-danger">Errore di rete o del server.</div>';
      }
    });
  </script>
</body>
</html>
