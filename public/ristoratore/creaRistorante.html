<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Crea Ristorante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
    }
    .main-content h2 {
      color: #0d6efd;
      margin-bottom: 1.5rem;
    }
    .form-container {
      max-width: 600px;
      margin: auto;
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("ristoratore");
  </script>

<div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
    <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
    <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
    <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="statistiche.html" class="nav-link">Statistiche</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

    <div class="main-content">
    <h2>Crea Ristorante</h2>
    <div class="form-container">
      <form id="restaurantForm">
        <div class="mb-3">
          <label for="name" class="form-label">Nome del Ristorante *</label>
          <input type="text" id="name" class="form-control" placeholder="es. Trattoria Il Gusto Urbano" required>
        </div>
        <div class="mb-3">
          <label for="address" class="form-label">Indirizzo *</label>
          <input type="text" id="address" class="form-control" placeholder="es. Corso Vittorio Emanuele II 58, 10121 Torino (TO)" required>
        </div>
        <div class="mb-3">
          <label for="numero_di_telefono" class="form-label">Numero di Telefono *</label>
          <input type="tel" id="numero_di_telefono" class="form-control" placeholder="es. +39 011 765 4321" required>
        </div>
        <div class="mb-3">
          <label for="piva" class="form-label">Partita IVA *</label>
          <input type="text" id="piva" class="form-control" placeholder="es. 09876543210" required>
        </div>
        <div class="mb-3">
          <label for="description" class="form-label">Descrizione</label>
          <textarea id="description" class="form-control" rows="3" placeholder="es. Cucina mediterranea con opzioni senza glutine e delivery serale."></textarea>
        </div>
        <div class="mb-3">
          <label for="image" class="form-label">URL Immagine *</label>
          <input type="url" id="image" class="form-control" placeholder="es. https://cdn.fastfoodapp.it/uploads/ristoranti/trattoria-gusto.jpg" required>
        </div>
        <button type="submit" class="btn btn-warning">Crea Ristorante</button>
      </form>
    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");
    var userId = localStorage.getItem("userId");

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) { // token scaduto o invalido
            window.handleAuthIssue("sessione non valida");
          }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    var restaurantForm = document.getElementById("restaurantForm");
    restaurantForm.addEventListener("submit", async function(e) {
      e.preventDefault();

      var name = document.getElementById("name").value.trim();
      var address = document.getElementById("address").value.trim();
      var numeroDiTelefono = document.getElementById("numero_di_telefono").value.trim();
      var piva = document.getElementById("piva").value.trim();
      var description = document.getElementById("description").value.trim();
      var image = document.getElementById("image").value.trim();

      if (!name || !address || !numeroDiTelefono || !piva || !image) {
        alert("Compila tutti i campi obbligatori: nome, indirizzo, numero di telefono, partita IVA e URL immagine.");
        return;
      }

      var payload = {
        name: name,
        address: address,
        numero_di_telefono: numeroDiTelefono,
        piva: piva,
        description: description,
        image: image,
        ristoratore_id: userId,
      };

      try {
        var response = await fetchConControlloToken(apiBase + "/restaurants", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(payload)
        });
        if (!response) {
          throw new Error("Nessuna risposta dal server");
        }
        var data = await response.json();
        if (!response.ok) {
          alert("Creazione ristorante non riuscita: " + (data.error || "si è verificato un errore durante il salvataggio."));
          return;
        }
        alert("Ristorante creato con successo! Ora puoi iniziare a gestirlo dalla dashboard.");
        window.location.href = "home.html";
      } catch (err) {
        console.error("Errore:", err);
        alert("Creazione ristorante non riuscita: errore di rete o del server.");
      }
    });
  </script>
</body>
</html>
