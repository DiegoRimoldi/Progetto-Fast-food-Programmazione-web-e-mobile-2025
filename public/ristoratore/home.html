<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Dashboard Ristoratore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    .main-content {
      flex: 1;
      padding: 1rem 2rem 2rem;
      background: #eef3f7;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .main-content h2 {
      color: #0d6efd;
      margin-bottom: 0;
    }
    .dashboard-title-card {
      border: 1px solid #dce6f8;
      border-radius: 16px;
      background: linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
      margin: 0 auto 1rem;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 10px 24px rgba(13, 110, 253, 0.08);
      text-align: center;
      overflow: hidden;
    }
    .dashboard-title-card .title-main {
      background: linear-gradient(90deg, #0d6efd, #5c9bff);
      color: #fff;
      font-size: clamp(1.35rem, 2vw, 1.75rem);
      font-weight: 700;
      line-height: 1.2;
      margin: 0;
      padding: 0.9rem 1.2rem;
    }
    .dashboard-title-card .title-sub {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
      padding: 0.9rem 1.2rem 1rem;
    }
    #contentArea {
      width: 100%;
      max-width: 1180px;
    }
    .card-custom {
      border: 0;
      border-radius: 22px;
      margin-bottom: 1rem;
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.36) 0%, rgba(255, 255, 255, 0) 50%),
        linear-gradient(145deg, #123c89 0%, #0d6efd 38%, #1f7bff 100%);
      color: #f8fbff;
      box-shadow:
        0 20px 35px rgba(13, 41, 93, 0.25),
        inset 0 1px 0 rgba(255, 255, 255, 0.25);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }
    .card-custom::before {
      content: "";
      position: absolute;
      width: 240px;
      height: 240px;
      top: -120px;
      right: -80px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0) 75%);
      z-index: -1;
      pointer-events: none;
    }
    .overview-card .card-header {
      background: rgba(5, 20, 49, 0.24);
      color: #ffffff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(6px);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 1rem;
      padding: 1rem 1.25rem;
    }
    .overview-card .card-body {
      background: linear-gradient(180deg, rgba(10, 31, 69, 0.12) 0%, rgba(8, 28, 63, 0.25) 100%);
      border-radius: 0 0 22px 22px;
      padding: 1.2rem 1.25rem 1.3rem;
    }
    .empty-state-card {
      max-width: 620px;
      margin: 2.5rem auto 0;
      border: 1px solid #dce6f8;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(13, 110, 253, 0.12);
      background: linear-gradient(160deg, #ffffff 0%, #f1f7ff 100%);
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.7rem;
      background: #e8f1ff;
      color: #0d6efd;
      margin-bottom: 0.8rem;
    }
    .order-item-card {
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      padding: 0.95rem 1rem;
      margin-bottom: 0.8rem;
      background: rgba(255, 255, 255, 0.14);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3), 0 8px 20px rgba(3, 16, 44, 0.18);
      color: #ffffff;
    }
    .order-item-card p {
      margin-bottom: 0.4rem;
      color: rgba(248, 251, 255, 0.95);
    }
    .order-item-card p:last-child {
      margin-bottom: 0;
    }
    .order-item-card strong {
      color: #ffffff;
    }
    .restaurant-image {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      background-color: rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 22px rgba(4, 19, 45, 0.3);
    }
    .data-label {
      color: rgba(225, 236, 255, 0.78);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.045em;
      margin-bottom: 0.18rem;
    }
    .data-value {
      color: #ffffff;
      font-weight: 600;
      margin-bottom: 0.9rem;
    }
    .overview-card .badge.bg-warning {
      background-color: #ffe08a !important;
      color: #2d1f00;
      border: 1px solid rgba(255, 196, 53, 0.5);
      font-weight: 700;
    }
    .overview-card .text-muted {
      color: rgba(240, 247, 255, 0.82) !important;
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("ristoratore");
  </script>

<div class="sidebar">
  <div class="sidebar-header">
    <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
  </div>
  <a href="home.html" class="nav-link active">Dashboard</a>
  <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
  <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
  <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
  <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
  <a href="ordini.html" class="nav-link">Ordini</a>
  <a href="statistiche.html" class="nav-link">Statistiche</a>
  <a href="../profilo.html" class="nav-link">Profilo</a>
  <a href="../logout.html" class="nav-link">Logout</a>

</div>

  <div class="main-content" id="contentArea">
    <div class="page-shell">
      <div class="card hero-card mb-4">
        <div class="card-body p-4">
          <h2 class="hero-title h3">Dashboard Ristoratore</h2>
          <p class="hero-subtitle">Aggiorna i dati in modo semplice e mantieni sempre il profilo del locale in ordine.</p>
        </div>
      </div>
    </div>
  </div>

<script>
  var apiBase = "http://localhost:3000";
  var token = localStorage.getItem("token");
  var userId = localStorage.getItem("userId");

  async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        let response = await fetch(url, options);

        if (response.status === 401) { // token scaduto o invalido
            window.handleAuthIssue("sessione non valida");
          }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

  async function caricaDatiRistorante() {
    try {
      var response = await fetchConControlloToken(apiBase + "/restaurants", {
        headers: { "Authorization": "Bearer " + token }
      });
      if (!response || !response.ok) {
        throw new Error("Impossibile recuperare i ristoranti.");
      }
      var restaurants = await response.json();

      var mioRistorante = restaurants.find(function(r) {
        return r.ristoratore_id && (r.ristoratore_id === userId || r.ristoratore_id.toString() === userId);
      });
      var contentArea = document.getElementById("contentArea");

      if (!mioRistorante) {
        contentArea.innerHTML =
          '<div class="card empty-state-card">' +
            '<div class="card-body text-center p-4 p-md-5">' +
              '<div class="empty-state-icon">🍔</div>' +
              '<h4 class="fw-semibold mb-2">Non hai ancora creato un ristorante</h4>' +
              '<p class="text-muted mb-4">Inizia adesso configurando il tuo ristorante e rendilo visibile ai clienti.</p>' +
              '<a href="creaRistorante.html" class="btn btn-primary btn-lg px-4">Crea Ristorante</a>' +
            '</div>' +
          '</div>';
        return;
      }

      contentArea.innerHTML = `
        <div class="row g-4 justify-content-center">
          <div class="col-12 col-lg-6">
            <div class="card card-custom overview-card h-100">
              <div class="card-header">Dati Ristorante</div>
              <div class="card-body">
                <div class="mb-3">
                  <img
                    src="${mioRistorante.image || '../assets/logo.png'}"
                    class="restaurant-image"
                    alt="Immagine ristorante ${mioRistorante.name || ''}"
                    onerror="this.onerror=null; this.src='../assets/logo.png';"
                  />
                </div>
                <div class="data-label">Nome</div>
                <div class="data-value">${mioRistorante.name || "Non disponibile"}</div>

                <div class="data-label">Indirizzo</div>
                <div class="data-value">${mioRistorante.address || "Non disponibile"}</div>

                <div class="data-label">Numero di telefono</div>
                <div class="data-value">${mioRistorante.numero_di_telefono || "Non disponibile"}</div>

                <div class="data-label">Partita IVA</div>
                <div class="data-value">${mioRistorante.piva || "Non disponibile"}</div>

                <div class="data-label">Descrizione</div>
                <div class="data-value">${mioRistorante.description || "Non disponibile"}</div>

                <div class="data-label">ID Ristorante</div>
                <div class="data-value">${mioRistorante._id || "Non disponibile"}</div>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="card card-custom overview-card h-100">
              <div class="card-header">Ordini in Corso</div>
              <div class="card-body" id="ordersInProgress">
              </div>
            </div>
          </div>
        </div>
      `;

      caricaOrdini(mioRistorante._id);
    } catch (err) {
      console.error("Errore nel caricamento dei dati del ristorante:", err);
    }
  }

  async function caricaOrdini(ristoranteId) {
    try {
      var response = await fetchConControlloToken(apiBase + "/orders", {
        headers: { "Authorization": "Bearer " + token }
      });

      if (!response.ok) throw new Error("Errore nel recupero degli ordini.");

      var orders = await response.json();
      var ordiniFiltrati = orders.filter(function(o) {
        return o.ristorante_id && o.ristorante_id.toString() === ristoranteId.toString() && o.stato !== "consegnato";
      });

      var ordersContainer = document.getElementById("ordersInProgress");
      ordersContainer.innerHTML = "";

      if (ordiniFiltrati.length === 0) {
        ordersContainer.innerHTML = '<p class="text-muted">Nessun ordine in corso.</p>';
        return;
      }

      ordiniFiltrati.forEach(order => {
        var dataOrdine = order.data_ordine || "Non disponibile";
        var numeroPiatti = Array.isArray(order.meals)
          ? order.meals.reduce((totale, meal) => totale + (Number(meal.quantita) || 0), 0)
          : 0;
        var tempoAttesa = Number.isFinite(order.tempo_attesa) ? order.tempo_attesa : null;
        var indirizzoConsegna = order.metodo_consegna === "Consegna a domicilio"
          ? (order.indirizzo_consegna || "Non disponibile")
          : "Ritiro presso il ristorante";

        var orderDiv = document.createElement("div");
        orderDiv.className = "order-item-card";
        orderDiv.innerHTML = `
          <p><strong>Ordine #${order._id}</strong></p>
          <p>Data ordine: ${dataOrdine}</p>
          <p>Cliente: ${order.cliente_nome}</p>
          <p>Totale: €${order.totale.toFixed(2)}</p>
          <p>Stato: <span class="badge bg-warning">${order.stato}</span></p>
          <p>Consegna: ${order.metodo_consegna}</p>
          <p>Piatti totali: ${numeroPiatti}</p>
          <p>Indirizzo consegna: ${indirizzoConsegna}</p>
          <p>Tempo di attesa stimato: ${tempoAttesa !== null ? tempoAttesa + " min" : "Non disponibile"}</p>
        `;
        ordersContainer.appendChild(orderDiv);
      });

    } catch (err) {
      console.error("Errore nel caricamento degli ordini:", err);
    }
  }

  caricaDatiRistorante();
</script>
</body>
</html>
