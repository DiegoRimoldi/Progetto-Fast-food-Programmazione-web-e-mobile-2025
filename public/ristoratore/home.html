<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Dashboard Ristoratore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <link rel="icon" type="image/png" href="../assets/Favicon.png">

  <script src="../assets/auth.js"></script>

  <style>
    :root {
      --brand-primary: #0d6efd;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6c757d;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #f3f8ff 0%, #eefbf8 100%);
      display: flex;
      min-height: 100vh;
      color: var(--text);
    }

    /* SIDEBAR */
    .sidebar {
      width: clamp(190px, 22vw, 250px);
      background: var(--surface);
      border-right: 1px solid rgba(0,0,0,0.05);
      box-shadow: 2px 0 20px rgba(15,23,42,0.08);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-header {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .sidebar img {
      max-width: 150px;
    }

    .nav-link {
      color: #4b5563;
      padding: 0.7rem 0.9rem;
      border-radius: 0.75rem;
      margin-bottom: 0.4rem;
      font-weight: 500;
      transition: 0.2s;
    }

    .nav-link:hover,
    .nav-link.active {
      background: linear-gradient(120deg, #0d6efd, #6ea8fe);
      color: #fff;
      transform: translateX(2px);
    }

    /* MAIN */
    .main-content {
      flex: 1;
      padding: clamp(1.2rem, 2.5vw, 2rem);
    }

    .page-shell {
      max-width: 1100px;
      margin: auto;
    }

    .hero-card {
      border-radius: 1rem;
      background: white;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }

    .hero-title {
      color: var(--brand-primary);
      font-weight: 700;
    }

    .hero-subtitle {
      color: var(--muted);
    }

    /* CARD */
    .card-custom {
      border-radius: 1rem;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
      border: none;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(120deg, #0d6efd, #6ea8fe);
      color: white;
      font-weight: 600;
    }

    .restaurant-image {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 0.75rem;
      border: 1px solid #e9ecef;
    }

    .data-label {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .data-value {
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    /* ORDERS */
    .order-item {
      border: 1px solid #e5e7eb;
      border-radius: 0.9rem;
      padding: 0.9rem;
      background: #fff;
      margin-bottom: 0.7rem;
    }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 12px 30px rgba(15,23,42,0.08);
    }
  </style>
</head>

<body>

<script>
  window.ensureAuthenticatedRole("ristoratore");
</script>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <a href="../index.html">
      <img src="../assets/logo.png" alt="Logo">
    </a>
  </div>

  <a href="home.html" class="nav-link active">Dashboard</a>
  <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
  <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
  <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
  <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica</a>
  <a href="ordini.html" class="nav-link">Ordini</a>
  <a href="statistiche.html" class="nav-link">Statistiche</a>
  <a href="../profilo.html" class="nav-link">Profilo</a>
  <a href="../logout.html" class="nav-link">Logout</a>
</div>

<!-- MAIN -->
<div class="main-content">
  <div class="page-shell">

    <div class="card hero-card mb-4">
      <div class="card-body">
        <h2 class="hero-title">Dashboard Ristoratore</h2>
        <p class="hero-subtitle">Controlla ristorante e ordini in modo rapido.</p>
      </div>
    </div>

    <div id="contentArea"></div>

  </div>
</div>

<script>
const apiBase = "http://localhost:3000";

async function fetchConToken(url, options = {}) {
  const token = localStorage.getItem("token");
  if (!token) return window.handleAuthIssue();

  options.headers = options.headers || {};
  options.headers["Authorization"] = "Bearer " + token;

  const res = await fetch(url, options);
  if (res.status === 401) window.handleAuthIssue();

  return res;
}

async function caricaDatiRistorante() {
  try {
    const userId = localStorage.getItem("userId");

    const res = await fetchConToken(apiBase + "/restaurants");
    const restaurants = await res.json();

    const mio = restaurants.find(r =>
      r.ristoratore_id && r.ristoratore_id.toString() === userId
    );

    const area = document.getElementById("contentArea");

    if (!mio) {
      area.innerHTML = `
        <div class="empty-state">
          <p class="fs-5 text-muted">Non hai ancora un ristorante</p>
          <a href="creaRistorante.html" class="btn btn-primary">Crea Ristorante</a>
        </div>`;
      return;
    }

    area.innerHTML = `
      <div class="row g-4">
        <div class="col-lg-6">
          <div class="card card-custom">
            <div class="card-header">Dati Ristorante</div>
            <div class="card-body">
              <img src="${mio.image || '../assets/logo.png'}" class="restaurant-image mb-3">

              <div class="data-label">Nome</div>
              <div class="data-value">${mio.name}</div>

              <div class="data-label">Indirizzo</div>
              <div class="data-value">${mio.address}</div>

              <div class="data-label">Telefono</div>
              <div class="data-value">${mio.numero_di_telefono}</div>

              <div class="data-label">P.IVA</div>
              <div class="data-value">${mio.piva}</div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="card card-custom">
            <div class="card-header">Ordini in corso</div>
            <div class="card-body" id="orders"></div>
          </div>
        </div>
      </div>
    `;

    caricaOrdini(mio._id);

  } catch (e) {
    console.error(e);
  }
}

async function caricaOrdini(id) {
  const res = await fetchConToken(apiBase + "/orders");
  const orders = await res.json();

  const filtrati = orders.filter(o =>
    o.ristorante_id == id && o.stato !== "consegnato"
  );

  const box = document.getElementById("orders");

  if (!filtrati.length) {
    box.innerHTML = "<p class='text-muted'>Nessun ordine</p>";
    return;
  }

  filtrati.forEach(o => {
    const div = document.createElement("div");
    div.className = "order-item";
    div.innerHTML = `
      <strong>Ordine #${o._id}</strong><br>
      Cliente: ${o.cliente_nome}<br>
      Totale: €${o.totale.toFixed(2)}<br>
      Stato: <span class="badge bg-warning">${o.stato}</span>
    `;
    box.appendChild(div);
  });
}

caricaDatiRistorante();
</script>

</body>
</html>
