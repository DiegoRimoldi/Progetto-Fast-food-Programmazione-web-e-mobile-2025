<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Food - Dashboard Ristoratore</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">

  <style>
    body.dashboard-home {
      margin: 0;
      padding: 0;
      background-color: #f6f8fb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    .dashboard-home .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }

    .dashboard-home .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .dashboard-home .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .dashboard-home .sidebar-logo-link:hover {
      transform: scale(1.03);
    }

    .dashboard-home .sidebar-header img {
      max-width: 150px;
    }

    .dashboard-home .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }

    .dashboard-home .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }

    .dashboard-home .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }

    .dashboard-home .main-content {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .dashboard-home .main-content h2 {
      color: #0d6efd;
      margin-bottom: 0;
      font-size: 1.4rem;
    }

    .dashboard-home .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .dashboard-home .dashboard-card {
      border: 1px solid #e9eef5;
      border-radius: 1rem;
      background-color: #ffffff;
      box-shadow: 0 8px 18px rgba(8, 38, 78, 0.08);
      height: 100%;
    }

    .dashboard-home .dashboard-card .card-header {
      border-radius: 1rem 1rem 0 0;
      background: #fecd4c;
      border-bottom: 1px solid #f0d783;
      font-weight: 700;
      color: #1f2937;
    }

    .dashboard-home .info-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.65rem;
    }

    .dashboard-home .info-item {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      border: 1px solid #edf1f5;
      border-radius: 0.7rem;
      padding: 0.6rem 0.8rem;
      background: #fafcff;
    }

    .dashboard-home .info-label {
      color: #6c757d;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04rem;
      margin: 0;
    }

    .dashboard-home .info-value {
      color: #1f2937;
      margin: 0;
      font-size: 0.95rem;
      word-break: break-word;
    }

    .dashboard-home .orders-list {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 460px;
      overflow-y: auto;
      padding-right: 0.2rem;
    }

    .dashboard-home .order-row {
      border: 1px solid #edf1f5;
      border-radius: 0.7rem;
      padding: 0.7rem 0.8rem;
      background: #fafcff;
    }

    .dashboard-home .order-head {
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      align-items: center;
      margin-bottom: 0.45rem;
    }

    .dashboard-home .order-title {
      margin: 0;
      font-size: 0.98rem;
      color: #0d2f6f;
    }

    .dashboard-home .status-pill {
      border-radius: 999px;
      font-size: 0.78rem;
      padding: 0.2rem 0.55rem;
      font-weight: 700;
      text-transform: capitalize;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .dashboard-home .status-pill.ordinato,
    .dashboard-home .status-pill.in-preparazione {
      background-color: #fff4d6;
      color: #8f5f00;
      border-color: #f6de8d;
    }

    .dashboard-home .status-pill.in-consegna {
      background-color: #e7f1ff;
      color: #0d58ca;
      border-color: #9cc1ff;
    }

    .dashboard-home .status-pill.consegnato {
      background-color: #ddf6e8;
      color: #0f5132;
      border-color: #99ddb7;
    }

    .dashboard-home .order-meta,
    .dashboard-home .order-meals {
      margin: 0;
      color: #495057;
      font-size: 0.88rem;
    }

    .dashboard-home .empty-text {
      color: #6c757d;
      margin: 0;
    }

    .dashboard-home .empty-state-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 2rem;
    }

    .dashboard-home .empty-state-card {
      width: 100%;
      max-width: 800px;
      border: none;
      border-radius: 1rem;
      background-color: #ffffff;
      box-shadow: 0 6px 18px rgba(30, 42, 56, 0.08);
    }

    .dashboard-home .empty-state-icon {
      width: 160px;
      height: 160px;
      padding-bottom: 20px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e4ebf7;
      font-size: 6rem;
      margin-bottom: 2rem;
    }

    .dashboard-home .empty-state-title {
      font-size: 2.3rem;
      font-weight: 600;
      color: #0f213a;
      margin-bottom: 0.5rem;
    }

    .dashboard-home .empty-state-subtitle {
      font-size: 1.15rem;
      color: #6c757d;
      margin-bottom: 1.5rem;
    }

    .dashboard-home .empty-state-btn {
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 0.75rem;
      padding: 0.7rem 1.8rem;
      background: linear-gradient(90deg, #1f6fe5 0%, #64a3f9 100%);
      box-shadow: 0 6px 16px rgba(31, 111, 229, 0.25);
      transition: 0.2s;
    }

    .dashboard-home .empty-state-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(31, 111, 229, 0.3);
    }

    @media (max-width: 992px) {
      .dashboard-home .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>

<body class="dashboard-home">

<script>
  window.ensureAuthenticatedRole("ristoratore");
</script>

<div class="sidebar">
  <div class="sidebar-header">
    <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="Logo" />
    </a>
  </div>

  <a href="home.html" class="nav-link active">Dashboard</a>
  <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
  <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
  <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
  <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
  <a href="ordini.html" class="nav-link">Ordini</a>
  <a href="statistiche.html" class="nav-link">Statistiche</a>
  <a href="../profilo.html" class="nav-link">Profilo</a>
  <a href="../logout.html" class="nav-link">Logout</a>
</div>

<div class="main-content">
  <h2 id="dashboardTitle">Dashboard Ristoratore</h2>
  <div id="contentArea"></div>
</div>

<script>
  var apiBase = "http://localhost:3000";
  var token = localStorage.getItem("token");
  var userId = localStorage.getItem("userId");

  async function fetchConControlloToken(url, options) {
    if (!token) {
      window.handleAuthIssue("sessione non valida");
      return null;
    }

    var requestOptions = options || {};
    requestOptions.headers = requestOptions.headers || {};
    requestOptions.headers["Authorization"] = "Bearer " + token;

    try {
      var response = await fetch(url, requestOptions);
      if (response.status === 401) {
        window.handleAuthIssue("sessione non valida");
      }
      return response;
    } catch (error) {
      console.error("Errore API:", error);
      return null;
    }
  }

  function formatEuro(value) {
    return "€" + Number(value || 0).toFixed(2);
  }


  function estraiTimestampOrdine(order) {
    if (!order || !order.data_ordine) return 0;

    var raw = String(order.data_ordine).trim();
    var m = raw.match(/^(\d{2})\/(\d{2})\/(\d{4})\s*-\s*(\d{2}):(\d{2})$/);

    if (m) {
      return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]), Number(m[4]), Number(m[5])).getTime();
    }

    var ts = new Date(raw).getTime();
    return Number.isNaN(ts) ? 0 : ts;
  }

  function normalizeStatusClass(stato) {
    return String(stato || "").toLowerCase().trim().replace(/\s+/g, "-");
  }

  function renderRestaurantCard(restaurant) {
    var menuCount = Array.isArray(restaurant.menu) ? restaurant.menu.length : 0;

    return '<div class="card dashboard-card">' +
      '<div class="card-header">Il tuo ristorante</div>' +
      '<div class="card-body">' +
      '<div class="info-list">' +
      '<div class="info-item"><p class="info-label">Nome</p><p class="info-value">' + (restaurant.name || "N/D") + '</p></div>' +
      '<div class="info-item"><p class="info-label">Indirizzo</p><p class="info-value">' + (restaurant.address || "N/D") + '</p></div>' +
      '<div class="info-item"><p class="info-label">Telefono</p><p class="info-value">' + (restaurant.numero_di_telefono || "N/D") + '</p></div>' +
      '<div class="info-item"><p class="info-label">Partita IVA</p><p class="info-value">' + (restaurant.piva || "N/D") + '</p></div>' +
      '<div class="info-item"><p class="info-label">Descrizione</p><p class="info-value">' + (restaurant.description || "Nessuna descrizione inserita") + '</p></div>' +
      '<div class="info-item"><p class="info-label">Piatti nel menu</p><p class="info-value">' + menuCount + '</p></div>' +
      '</div>' +
      '</div>' +
      '</div>';
  }

  function renderOrdersCard(orders) {
    if (!orders.length) {
      return '<div class="card dashboard-card">' +
        '<div class="card-header">Ordini in corso</div>' +
        '<div class="card-body"><p class="empty-text">Nessun ordine in corso al momento.</p></div>' +
        '</div>';
    }

    var orderRows = orders.map(function(order) {
      var mealsCount = Array.isArray(order.meals)
        ? order.meals.reduce(function(total, meal) { return total + Number(meal.quantita || 0); }, 0)
        : 0;

      return '<div class="order-row">' +
        '<div class="order-head">' +
        '<p class="order-title">Ordine #' + (order._id || "-") + '</p>' +
        '<span class="status-pill ' + normalizeStatusClass(order.stato) + '">' + (order.stato || "N/D") + '</span>' +
        '</div>' +
        '<p class="order-meta">Cliente: ' + (order.cliente_nome || "N/D") + '</p>' +
        '<p class="order-meta">Data: ' + (order.data_ordine || "N/D") + '</p>' +
        '<p class="order-meta">Metodo: ' + (order.metodo_consegna || "N/D") + '</p>' +
        '<p class="order-meta">Totale: ' + formatEuro(order.totale) + '</p>' +
        '<p class="order-meals">Piatti totali: ' + mealsCount + '</p>' +
        '</div>';
    }).join("");

    return '<div class="card dashboard-card">' +
      '<div class="card-header">Ordini in corso (' + orders.length + ')</div>' +
      '<div class="card-body"><div class="orders-list">' + orderRows + '</div></div>' +
      '</div>';
  }

  function renderDashboard(restaurant, orders) {
    var contentArea = document.getElementById("contentArea");
    contentArea.innerHTML =
      '<div class="dashboard-grid">' +
      '<div>' + renderRestaurantCard(restaurant) + '</div>' +
      '<div>' + renderOrdersCard(orders) + '</div>' +
      '</div>';
  }

  async function caricaDatiRistorante() {
    var restaurantsResponse = await fetchConControlloToken(apiBase + "/restaurants");

    if (!restaurantsResponse || !restaurantsResponse.ok) return;

    var restaurants = await restaurantsResponse.json();
    var mioRistorante = restaurants.find(function(r) {
      return String(r.ristoratore_id) === String(userId);
    });

    var contentArea = document.getElementById("contentArea");
    var dashboardTitle = document.getElementById("dashboardTitle");

    if (!mioRistorante) {
      dashboardTitle.style.display = "none";
      contentArea.innerHTML =
        '<div class="empty-state-wrapper">' +
        '<div class="card empty-state-card">' +
        '<div class="card-body text-center py-5 px-4">' +
        '<div class="empty-state-icon">🍔</div>' +
        '<h3 class="empty-state-title">Non hai ancora creato un ristorante</h3>' +
        '<p class="empty-state-subtitle">Inizia adesso configurando il tuo ristorante e rendilo visibile ai clienti.</p>' +
        '<a href="creaRistorante.html" class="btn text-white empty-state-btn">Crea Ristorante</a>' +
        '</div>' +
        '</div>' +
        '</div>';
      return;
    }

    dashboardTitle.style.display = "block";

    var ordersResponse = await fetchConControlloToken(apiBase + "/orders");
    var inCorso = [];

    if (ordersResponse && ordersResponse.ok) {
      var allOrders = await ordersResponse.json();
      inCorso = allOrders
        .filter(function(order) {
          return String(order.ristorante_id) === String(mioRistorante._id) && order.stato !== "consegnato";
        })
        .sort(function(a, b) {
          return estraiTimestampOrdine(b) - estraiTimestampOrdine(a);
        });
    }

    renderDashboard(mioRistorante, inCorso);
  }

  caricaDatiRistorante();
</script>

</body>
</html>
