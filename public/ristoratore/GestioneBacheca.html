<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Gestione Bacheca</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/><link rel="stylesheet" href="../assets/modern-theme.css"><link rel="stylesheet" href="../assets/responsive.css"/><script src="../assets/auth.js"></script></head><body><script>window.ensureAuthenticatedRole("ristoratore");</script><div class="d-flex"><div class="sidebar p-3" style="width:240px;min-height:100vh;background:#fff;box-shadow:2px 0 5px rgba(0,0,0,.1)"><a href="home.html" class="nav-link">Dashboard</a><a href="GestioneMenù.html" class="nav-link">Gestione Menù</a><a href="GestioneBacheca.html" class="nav-link active">Gestione Bacheca</a><a href="../logout.html" class="nav-link">Logout</a></div><main class="p-4 flex-grow-1"><h2 class="text-primary">Gestione Bacheca</h2><div id="board" class="row g-3"></div></main></div><script>const apiBase='http://localhost:3000';async function f(u,o={}){const t=localStorage.getItem('token');o.headers=o.headers||{};o.headers.Authorization='Bearer '+t;return fetch(u,o)}async function load(){const uid=localStorage.getItem('userId');const rs=await (await f(apiBase+'/restaurants')).json();const mio=rs.find(x=>x.ristoratore_id&&x.ristoratore_id.toString()===uid);if(!mio)return;const meals=await (await f(apiBase+'/meals?ristorante_id='+mio._id)).json();const by={};(meals||[]).forEach(m=>{const c=m.strCategory||'Altro';(by[c]=by[c]||[]).push(m)});const b=document.getElementById('board');b.innerHTML='';Object.keys(by).sort().forEach(cat=>{const d=document.createElement('div');d.className='col-12';d.innerHTML=`<div class='card'><div class='card-header bg-warning fw-bold'>${cat}</div><div class='card-body'><div class='row g-3'>${by[cat].map(p=>`<div class='col-md-6 col-lg-4'><div class='card h-100'><img src='${p.strMealThumb||''}' class='card-img-top' style='height:180px;object-fit:cover'><div class='card-body d-flex flex-column'><h5 class='text-primary'>${p.strMeal}</h5><p>Prezzo: €${Number(p.prezzo||0).toFixed(2)}</p><div class='input-group mb-2'><span class='input-group-text'>Sconto %</span><input id='s_${p._id}' class='form-control' type='number' min='1' max='90' value='${p.sconto_percentuale||10}'></div><button class='btn ${p.in_offerta?'btn-danger':'btn-success'}' onclick='toggleOffer("${p._id}",${p.in_offerta?'false':'true'})'>${p.in_offerta?'Rimuovi da bacheca':'Metti in bacheca'}</button></div></div></div>`).join('')}</div></div></div>`;b.appendChild(d)});}async function toggleOffer(id,en){const s=Number(document.getElementById('s_'+id).value||0);await f(apiBase+'/meals/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({in_offerta:en,sconto_percentuale:en?s:0})});load()}load();</script></body></html>
