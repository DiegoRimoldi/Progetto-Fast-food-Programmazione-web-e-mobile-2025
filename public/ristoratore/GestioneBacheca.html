<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestione Bacheca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <link rel="stylesheet" href="../assets/responsive.css"/>
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>window.ensureAuthenticatedRole("ristoratore");</script>
  <div class="d-flex">
    <div class="sidebar p-3" style="width:240px;min-height:100vh;background:#fff;box-shadow:2px 0 5px rgba(0,0,0,.1)">
      <a href="home.html" class="nav-link">Dashboard</a>
      <a href="GestioneMenù.html" class="nav-link">Gestione Menù</a>
      <a href="GestioneBacheca.html" class="nav-link active">Gestione Bacheca</a>
      <a href="../logout.html" class="nav-link">Logout</a>
    </div>
    <main class="p-4 flex-grow-1">
      <h2 class="text-primary">Gestione Bacheca</h2>
      <div id="board" class="row g-3"></div>
    </main>
  </div>

  <script>
    const apiBase = 'http://localhost:3000';

    async function f(url, options = {}) {
      const token = localStorage.getItem('token');
      options.headers = options.headers || {};
      options.headers.Authorization = 'Bearer ' + token;
      return fetch(url, options);
    }

    function prezzoScontato(piatto) {
      const prezzo = Number(piatto.prezzo || 0);
      if (piatto.prezzo_scontato !== undefined && piatto.prezzo_scontato !== null && piatto.prezzo_scontato !== '') {
        return Number(piatto.prezzo_scontato);
      }
      const percentuale = Number(piatto.sconto_percentuale || 0);
      return Number((prezzo * (1 - percentuale / 100)).toFixed(2));
    }

    async function load() {
      const uid = localStorage.getItem('userId');
      const restaurants = await (await f(apiBase + '/restaurants')).json();
      const mio = restaurants.find(x => x.ristoratore_id && x.ristoratore_id.toString() === uid);
      if (!mio) return;

      const meals = await (await f(apiBase + '/meals?ristorante_id=' + mio._id)).json();
      const by = {};
      (meals || []).forEach(meal => {
        const categoria = meal.strCategory || 'Altro';
        (by[categoria] = by[categoria] || []).push(meal);
      });

      const board = document.getElementById('board');
      board.innerHTML = '';

      Object.keys(by).sort().forEach(cat => {
        const section = document.createElement('div');
        section.className = 'col-12';
        section.innerHTML = `<div class='card'><div class='card-header bg-warning fw-bold'>${cat}</div><div class='card-body'><div class='row g-3'>${by[cat].map(meal => `
          <div class='col-md-6 col-lg-4'>
            <div class='card h-100'>
              <img src='${meal.strMealThumb || ''}' class='card-img-top' style='height:180px;object-fit:cover'>
              <div class='card-body d-flex flex-column'>
                <h5 class='text-primary'>${meal.strMeal}</h5>
                <p class='mb-2'>Prezzo base: €${Number(meal.prezzo || 0).toFixed(2)}</p>
                <div class='input-group mb-2'>
                  <span class='input-group-text'>Sconto %</span>
                  <input id='perc_${meal._id}' class='form-control' type='number' min='0' max='90' value='${meal.sconto_percentuale || 0}'>
                </div>
                <div class='input-group mb-2'>
                  <span class='input-group-text'>Prezzo €</span>
                  <input id='price_${meal._id}' class='form-control' type='number' min='0' step='0.01' value='${meal.prezzo_scontato ?? ''}' placeholder='facoltativo'>
                </div>
                ${meal.in_offerta ? `<p class='small text-danger mb-2'>In offerta a €${prezzoScontato(meal).toFixed(2)}</p>` : ''}
                <button class='btn ${meal.in_offerta ? 'btn-danger' : 'btn-success'} mt-auto' onclick='toggleOffer("${meal._id}", ${meal.in_offerta ? 'false' : 'true'})'>
                  ${meal.in_offerta ? 'Rimuovi da bacheca' : 'Metti in bacheca'}
                </button>
              </div>
            </div>
          </div>`).join('')}</div></div></div>`;
        board.appendChild(section);
      });
    }

    async function toggleOffer(id, enable) {
      const percentuale = Number(document.getElementById('perc_' + id).value || 0);
      const prezzoScontato = document.getElementById('price_' + id).value;
      const payload = {
        in_offerta: enable,
        sconto_percentuale: enable ? percentuale : 0,
        prezzo_scontato: enable && prezzoScontato !== '' ? Number(prezzoScontato) : null
      };

      await f(apiBase + '/meals/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      load();
    }

    load();
  </script>
</body>
</html>
