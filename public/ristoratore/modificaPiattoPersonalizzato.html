<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Modifica Piatto Personalizzato</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background: #fff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    .main-content h2 {
      color: #0d6efd;
      margin-bottom: 1.5rem;
    }
    .meal-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .meal-card {
      cursor: pointer;
      border: 1px solid #dee2e6;
      border-radius: 0.75rem;
      transition: all 0.2s ease;
      background: #fff;
    }
    .meal-card:hover {
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      transform: translateY(-2px);
    }
    .meal-card.selected {
      border-color: #0d6efd;
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2);
    }
    .meal-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-top-left-radius: 0.75rem;
      border-top-right-radius: 0.75rem;
      background: #f8f9fa;
    }
    .meal-card .card-body {
      padding: 0.9rem;
    }
    .meal-card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .meal-card-meta {
      font-size: 0.9rem;
      color: #6c757d;
      margin: 0;
    }
    #piattoPersonalizzato {
      max-width: 700px;
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("ristoratore");
  </script>
  <div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link">Dashboard</a>
    <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
    <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
    <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
    <a href="modificaPiattoPersonalizzato.html" class="nav-link active">Modifica Piatto Personalizzato</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="statistiche.html" class="nav-link">Statistiche</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

  <div class="main-content" id="intestazione">
    <h2>Modifica Piatto Personalizzato</h2>
    <div id="cardsContainer" class="meal-cards-grid"></div>
    <hr><br>
    <form id="piattoPersonalizzato" style="display: none;">
      <div class="mb-3">
        <label for="strMeal" class="form-label">Nome Piatto *</label>
        <input type="text" id="strMeal" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strCategory" class="form-label">Categoria</label>
        <input type="text" id="strCategory" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strArea" class="form-label">Area</label>
        <input type="text" id="strArea" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="prezzo" class="form-label">Prezzo (€)</label>
        <input type="number" id="prezzo" class="form-control" step="0.01" required>
      </div>
      <div class="mb-3">
        <label for="tempo_preparazione" class="form-label">Tempo di Preparazione (min)</label>
        <input type="number" id="tempo_preparazione" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="ingredients" class="form-label">Ingredienti (separati da virgole)</label>
        <input type="text" id="ingredients" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="measures" class="form-label">Quantità (separati da virgole, stesso numero degli ingredienti)</label>
        <input type="text" id="measures" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strMealThumb" class="form-label">URL Immagine</label>
        <input type="url" id="strMealThumb" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="strInstructions" class="form-label">Istruzioni</label>
        <textarea id="strInstructions" class="form-control" rows="4" required></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning">Modifica Piatto</button>
        <button type="button" class="btn btn-danger" id="btnRimuoviPiatto">Rimuovi Piatto</button>
      </div>
    </form>
    <div id="msg" class="mt-3"></div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var token = localStorage.getItem("token");
    var userId = localStorage.getItem("userId");

    var mioRistorante = null;
    var piattiPersonalizzati = [];
    var selectedMealId = null;

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }

      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;

      try {
        var response = await fetch(url, options);

        if (response.status === 401) {
          window.handleAuthIssue("sessione non valida");
        }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    function renderCards() {
      var cardsContainer = document.getElementById("cardsContainer");
      cardsContainer.innerHTML = "";

      piattiPersonalizzati.forEach(function(piatto) {
        var card = document.createElement("div");
        card.className = "meal-card" + (selectedMealId === piatto._id ? " selected" : "");
        card.dataset.mealId = piatto._id;

        card.innerHTML = `
          <img src="${piatto.strMealThumb || '../assets/logo.png'}" alt="${piatto.strMeal}">
          <div class="card-body">
            <p class="meal-card-title">${piatto.strMeal}</p>
            <p class="meal-card-meta">€ ${typeof piatto.prezzo === 'number' ? piatto.prezzo.toFixed(2) : '-'}</p>
          </div>
        `;

        card.addEventListener("click", function() {
          caricaDettagliPiatto(piatto._id);
        });

        cardsContainer.appendChild(card);
      });
    }

    function popolaForm(piatto) {
      document.getElementById("strMeal").value = piatto.strMeal;
      document.getElementById("strCategory").value = piatto.strCategory || "";
      document.getElementById("strArea").value = piatto.strArea || "";
      document.getElementById("prezzo").value = piatto.prezzo || "";
      document.getElementById("tempo_preparazione").value = piatto.tempo_preparazione || "";
      document.getElementById("ingredients").value = piatto.ingredients ? piatto.ingredients.join(", ") : "";
      document.getElementById("measures").value = piatto.measures ? piatto.measures.join(", ") : "";
      document.getElementById("strMealThumb").value = piatto.strMealThumb || "";
      document.getElementById("strInstructions").value = piatto.strInstructions || "";
      document.getElementById("piattoPersonalizzato").style.display = "block";
    }

    async function caricaDettagliPiatto(idMeal) {
      try {
        var piattoResponse = await fetchConControlloToken(apiBase + "/meals/" + idMeal, {
          headers: { "Authorization": "Bearer " + token }
        });

        if (!piattoResponse || !piattoResponse.ok) {
          throw new Error("Impossibile recuperare il piatto selezionato.");
        }

        var piatto = await piattoResponse.json();

        if (!piatto || !piatto._id) {
          console.warn("Piatto non trovato!");
          return;
        }

        selectedMealId = piatto._id;
        popolaForm(piatto);
        renderCards();
      } catch (err) {
        console.error("Errore nel recupero del piatto:", err);
      }
    }

    async function caricaRistorante() {
      try {
        var response = await fetchConControlloToken(apiBase + "/restaurants", {
          headers: { "Authorization": "Bearer " + token }
        });

        var restaurants = await response.json();
        mioRistorante = restaurants.find(function(r) {
          return r.ristoratore_id && r.ristoratore_id.toString() === userId;
        });

        if (!mioRistorante) {
          alert("Non hai ancora creato un ristorante. Vai alla pagina Gestisci Ristorante per crearlo.");
          window.location.href = "gestioneRistorante.html";
          return;
        }

        var piattiResponse = await fetchConControlloToken(apiBase + "/meals", {
          headers: { "Authorization": "Bearer " + token }
        });

        var tuttiPiatti = await piattiResponse.json();

        piattiPersonalizzati = tuttiPiatti.filter(function(p) {
          return p.ristorante_id && p.ristorante_id.toString() === mioRistorante._id.toString();
        });

        if (piattiPersonalizzati.length === 0) {
          var msg = document.createElement("h3");
          msg.textContent = "Non hai ancora inserito piatti personalizzati.";
          document.getElementById("intestazione").appendChild(msg);
          return;
        }

        renderCards();
      } catch (err) {
        console.error("Errore nel caricamento del ristorante o piatti:", err);
      }
    }

    document.getElementById("piattoPersonalizzato").addEventListener("submit", async function(e) {
      e.preventDefault();

      if (!selectedMealId) {
        alert("Seleziona prima un piatto da modificare.");
        return;
      }

      var payload = {
        strMeal: document.getElementById("strMeal").value.trim(),
        strCategory: document.getElementById("strCategory").value.trim(),
        strArea: document.getElementById("strArea").value.trim(),
        prezzo: parseFloat(document.getElementById("prezzo").value),
        tempo_preparazione: parseInt(document.getElementById("tempo_preparazione").value, 10),
        ingredients: document.getElementById("ingredients").value.split(",").map(function(i) { return i.trim(); }).filter(Boolean),
        measures: document.getElementById("measures").value.split(",").map(function(m) { return m.trim(); }).filter(Boolean),
        strMealThumb: document.getElementById("strMealThumb").value.trim(),
        strInstructions: document.getElementById("strInstructions").value.trim()
      };

      if (payload.ingredients.length !== payload.measures.length) {
        alert("Il numero di ingredienti e quantità deve essere uguale!");
        return;
      }

      try {
        var response = await fetchConControlloToken(apiBase + "/meals/" + selectedMealId, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          var errorText = await response.text();
          throw new Error("Errore HTTP " + response.status + " - " + errorText);
        }

        var index = piattiPersonalizzati.findIndex(function(p) { return p._id === selectedMealId; });
        if (index !== -1) {
          piattiPersonalizzati[index] = Object.assign({}, piattiPersonalizzati[index], payload);
        }
        renderCards();

        alert("Piatto modificato con successo!");
      } catch (err) {
        console.error("Errore nella modifica del piatto:", err);
        alert(err.message);
      }
    });

    document.getElementById("btnRimuoviPiatto").addEventListener("click", async function() {
      if (!selectedMealId) {
        alert("Seleziona prima un piatto da rimuovere.");
        return;
      }

      var conferma = confirm("Sei sicuro di voler rimuovere questo piatto?");
      if (!conferma) {
        return;
      }

      try {
        var response = await fetchConControlloToken(apiBase + "/meals/" + selectedMealId, {
          method: "DELETE",
          headers: {
            "Authorization": "Bearer " + token
          }
        });

        if (!response || !response.ok) {
          var errorText = response ? await response.text() : "Nessuna risposta dal server";
          throw new Error("Errore nella rimozione del piatto: " + errorText);
        }

        piattiPersonalizzati = piattiPersonalizzati.filter(function(p) {
          return p._id !== selectedMealId;
        });

        selectedMealId = null;
        document.getElementById("piattoPersonalizzato").reset();
        document.getElementById("piattoPersonalizzato").style.display = "none";
        renderCards();

        if (piattiPersonalizzati.length === 0) {
          document.getElementById("cardsContainer").innerHTML = "";
        }

        alert("Piatto rimosso con successo!");
      } catch (err) {
        console.error(err);
        alert(err.message);
      }
    });

    (async function init() {
      await caricaRistorante();
    })();
  </script>
</body>
</html>
