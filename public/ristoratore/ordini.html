<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FastFood - Ordini Ristoratore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/responsive.css">
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background: #fff;
      box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
    }
    h2 {
      color: #0d6efd;
      margin-bottom: 1.5rem;
    }
  </style>
  <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("ristoratore");
  </script>

<div class="sidebar">
  <div class="sidebar-header">
    <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
  </div>
  <a href="home.html" class="nav-link">Dashboard</a>
  <a href="gestioneRistorante.html" class="nav-link">Gestisci Ristorante</a>
  <a href="piattiGenerici.html" class="nav-link">Aggiungi Piatto Generico</a>
  <a href="piattoPersonalizzato.html" class="nav-link">Aggiungi Piatto Personalizzato</a>
  <a href="modificaPiattoPersonalizzato.html" class="nav-link">Modifica Piatto Personalizzato</a>
  <a href="ordini.html" class="nav-link active">Ordini</a>
  <a href="statistiche.html" class="nav-link">Statistiche</a>
  <a href="../profilo.html" class="nav-link">Profilo</a>
  <a href="../logout.html" class="nav-link">Logout</a>
</div>

<div class="main-content">
  <h2>Ordini Ristoratore</h2>

  <br><hr><br>

  <h3>Ordini Attivi</h3>
  <div id="activeOrders"></div>

  <br><hr><br>

  <h3>Storico Ordini</h3>
  <div id="historyOrders"></div>
</div>

<script>
  var apiBase = "http://localhost:3000";
  var token = localStorage.getItem("token");

  function estraiTimestampOrdine(order) {
    if (!order || !order.data_ordine) return 0;

    var dataOrdineRaw = String(order.data_ordine).trim();

    var matchDataIt = dataOrdineRaw.match(
      /^(\d{2})\/(\d{2})\/(\d{4})\s*-\s*(\d{2}):(\d{2})$/
    );

    if (matchDataIt) {
      var giorno = Number(matchDataIt[1]);
      var mese = Number(matchDataIt[2]) - 1;
      var anno = Number(matchDataIt[3]);
      var ore = Number(matchDataIt[4]);
      var minuti = Number(matchDataIt[5]);

      return new Date(anno, mese, giorno, ore, minuti).getTime();
    }

    var timestamp = new Date(dataOrdineRaw).getTime();
    return Number.isNaN(timestamp) ? 0 : timestamp;
  }

  async function fetchConControlloToken(url, options = {}) {
    var token = localStorage.getItem("token");

    if (!token) {
      window.handleAuthIssue("sessione non valida");
      return;
    }

    options.headers = options.headers || {};
    options.headers["Authorization"] = "Bearer " + token;

    try {
      let response = await fetch(url, options);

      if (response.status === 401) {
        window.handleAuthIssue("sessione non valida");
      }

      return response;
    } catch (error) {
      console.error("Errore nella richiesta API:", error);
      return null;
    }
  }

  async function caricaOrdiniRistoratore() {
    try {
      var response = await fetchConControlloToken(apiBase + "/orders");

      if (!response || !response.ok) {
        throw new Error("Impossibile recuperare gli ordini.");
      }

      var orders = await response.json();
      var activeOrders = document.getElementById("activeOrders");
      var historyOrders = document.getElementById("historyOrders");

      activeOrders.innerHTML = "";
      historyOrders.innerHTML = "";

      if (!Array.isArray(orders) || orders.length === 0) {
        activeOrders.innerHTML = "<p class=\"text-muted\">Nessun ordine attivo.</p>";
        historyOrders.innerHTML = "<p class=\"text-muted\">Nessun ordine nello storico.</p>";
        return;
      }

      var ordiniOrdinatiPerDataDesc = [...orders].sort((a, b) => {
        return estraiTimestampOrdine(b) - estraiTimestampOrdine(a);
      });

      var activeOrdersList = ordiniOrdinatiPerDataDesc.filter(order =>
        ["ordinato", "in preparazione", "in consegna"].includes(order.stato)
      );

      var historyOrdersList = ordiniOrdinatiPerDataDesc.filter(order =>
        !["ordinato", "in preparazione", "in consegna"].includes(order.stato)
      );

      var ordiniConsegnatiConfermatiDalCliente = historyOrdersList.filter(order =>
        order.metodo_consegna === "Consegna a domicilio" && order.notifica_ristoratore_consegna === true
      );

      if (ordiniConsegnatiConfermatiDalCliente.length > 0) {
        alert("Confermata la corretta consegna a domicilio al cliente.");
        confermaLetturaNotificheConsegna();
      }

      activeOrdersList.forEach(order => {
        var orderDiv = document.createElement("div");
        orderDiv.className = "order-card";
        orderDiv.innerHTML = `
          <br>
          <p><strong>Ordine #${order._id}</strong></p>
          <p>Cliente: ${order.cliente_nome || "Sconosciuto"}</p>
          <p>Totale: €${Number(order.totale || 0).toFixed(2)}</p>
          <p>Data ordine: ${order.data_ordine || "N/D"}</p>
          <p>Tempo di attesa: ${order.tempo_attesa ?? "N/D"} min</p>
          <p>Metodo di consegna: ${order.metodo_consegna || "N/D"}</p>
          <p><b>Piatti:</b></p>
          <ul>
            ${(order.meals || []).map(meal => `<li>${meal.nome} - Quantità: ${meal.quantita}</li>`).join("") || "<li>Nessun piatto disponibile</li>"}
          </ul>
          <p>Stato: <strong>${order.stato}</strong></p>
          <br>
        `;

        if (["ordinato", "in preparazione"].includes(order.stato)) {
          var updateBtn = document.createElement("button");
          updateBtn.className = "btn btn-warning";
          updateBtn.innerText = "Avanza Stato";
          updateBtn.onclick = () => cambiaStatoOrdine(order._id, order.stato, order.metodo_consegna);
          orderDiv.appendChild(updateBtn);
        }

        activeOrders.appendChild(orderDiv);
      });

      historyOrdersList.forEach(order => {
        var orderDiv = document.createElement("div");
        orderDiv.className = "order-card";
        orderDiv.innerHTML = `
          <br>
          <p><strong>Ordine #${order._id}</strong></p>
          <p>Cliente: ${order.cliente_nome || "Sconosciuto"}</p>
          <p>Totale: €${Number(order.totale || 0).toFixed(2)}</p>
          <p>Data ordine: ${order.data_ordine || "N/D"}</p>
          <p>Tempo di attesa: ${order.tempo_attesa ?? "N/D"} min</p>
          <p>Metodo di consegna: ${order.metodo_consegna || "N/D"}</p>
          <p><b>Piatti:</b></p>
          <ul>
            ${(order.meals || []).map(meal => `<li>${meal.nome} - Quantità: ${meal.quantita}</li>`).join("") || "<li>Nessun piatto disponibile</li>"}
          </ul>
          <p>Stato: <strong>${order.stato}</strong></p>
          <br>
        `;

        if (historyOrders.children.length > 0) {
          var separator = document.createElement("hr");
          historyOrders.appendChild(separator);
        }

        historyOrders.appendChild(orderDiv);
      });

    } catch (err) {
      console.error("Errore nel caricamento degli ordini:", err);
    }
  }

  async function cambiaStatoOrdine(orderId, statoAttuale, metodoConsegna) {
    try {
      var response = await fetchConControlloToken(`${apiBase}/orders/${orderId}`, {
        method: "PUT",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        }
      });

      if (!response.ok) throw new Error("Errore nella modifica dello stato.");

      var updatedOrder = null;
      var responseText = await response.text();

      if (responseText) {
        try {
          updatedOrder = JSON.parse(responseText);
        } catch (parseError) {
          console.warn("Risposta non JSON:", parseError);
        }
      }

      if (
        metodoConsegna === "Consegna a domicilio" &&
        statoAttuale === "in preparazione"
      ) {
        alert("L'ordine è in fase di consegna al cliente.");
      } else if (updatedOrder && updatedOrder.stato === "consegnato") {
        alert("Ordine consegnato correttamente al cliente.");
      } else if (
        statoAttuale === "in preparazione" &&
        metodoConsegna === "Ritiro in ristorante" &&
        (!updatedOrder || !updatedOrder.stato)
      ) {
        alert("Ordine consegnato correttamente al cliente.");
      }

      caricaOrdiniRistoratore();
    } catch (err) {
      console.error("Errore:", err);
    }
  }

  async function confermaLetturaNotificheConsegna() {
    try {
      await fetchConControlloToken(`${apiBase}/orders/notifiche-consegna/ack`, {
        method: "PUT",
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        }
      });
    } catch (err) {
      console.error("Errore nella conferma lettura notifiche consegna:", err);
    }
  }

  caricaOrdiniRistoratore();
</script>
</body>
</html>
