<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food - Offerte in Bacheca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/modern-theme.css" />
  <link rel="stylesheet" href="../assets/responsive.css" />
  <link rel="icon" type="image/png" href="../assets/Favicon.png" />
  <script src="../assets/auth.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; background: linear-gradient(180deg, #f3f8ff 0%, #eefbf8 100%); }
    .sidebar { width: clamp(190px, 22vw, 250px); flex: 0 0 clamp(190px, 22vw, 250px); background: #fff; border-right: 1px solid rgba(0,0,0,.05); box-shadow: 2px 0 20px rgba(15,23,42,.08); padding: 1.25rem 1rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-header { text-align: center; margin-bottom: 1.25rem; }
    .sidebar-header img { max-width: 150px; }
    .sidebar .nav-link { color: #4b5563; padding: .72rem .9rem; border-radius: .75rem; margin-bottom: .4rem; font-weight: 500; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: linear-gradient(120deg, #0d6efd 0%, #6ea8fe 100%); color: #fff; }
    .main-content { flex: 1; padding: clamp(1.25rem, 2.5vw, 2.25rem); }
    .panel-card { border: none; border-radius: 1rem; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%); }
    .menu-card { border-radius: 1rem; overflow: hidden; border: none; box-shadow: 0 12px 25px rgba(15,23,42,.09); transition: transform .2s ease, box-shadow .2s ease; }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 18px 34px rgba(15,23,42,.12); }
    .menu-card.in-offerta { background: linear-gradient(160deg, #ffffff 0%, #f2fff8 100%); outline: 2px solid rgba(25, 135, 84, 0.35); }
    .menu-card-cover { position: relative; }
    .menu-card-cover img { height: 210px; object-fit: cover; }
    .offer-badge { position: absolute; top: .9rem; left: .9rem; background: linear-gradient(120deg, #198754 0%, #20c997 100%); color: #fff; font-weight: 700; font-size: .78rem; border-radius: 999px; padding: .35rem .75rem; }
    .offer-old-price { text-decoration: line-through; color: #6c757d; font-size: .9rem; margin-bottom: 0; }
    .offer-new-price { color: #146c43; font-weight: 700; font-size: 1.05rem; margin-bottom: 0; }
    .offer-price-row { display:flex; align-items:center; gap:.55rem; flex-wrap:wrap; margin-bottom: .75rem; }
    .btn-outline-offer { --bs-btn-color: #198754; --bs-btn-border-color: #198754; --bs-btn-hover-color: #fff; --bs-btn-hover-bg: #198754; --bs-btn-hover-border-color: #198754; --bs-btn-focus-shadow-rgb: 25, 135, 84; --bs-btn-active-color: #fff; --bs-btn-active-bg: #157347; --bs-btn-active-border-color: #146c43; --bs-btn-disabled-color: #198754; --bs-btn-disabled-bg: transparent; --bs-btn-disabled-border-color: #198754; --bs-gradient: none; }
    .category-title { display:inline-flex; align-items:center; padding:.35rem .8rem; border-radius:999px; background:linear-gradient(120deg,#e7f1ff 0%,#effaf4 100%); color:#0b5ed7; font-weight:700; letter-spacing:.02em; font-size:1rem; }
    .category-tag { display:inline-flex; align-items:center; font-size:.74rem; border-radius:999px; padding:.32rem .62rem; background:#f0f7ff; color:#0d6efd; font-weight:600; margin-bottom:.55rem; }
  </style>
</head>
<body>
  <script>window.ensureAuthenticatedRole("cliente");</script>

  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" aria-label="Torna alla home"><img src="../assets/logo.png" alt="FastFood Logo" /></a>
    </div>
    <a href="home.html" class="nav-link">Home</a>
    <a href="carrello.html" class="nav-link">Carrello</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="offerte.html" class="nav-link active">Offerte</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </aside>

  <main class="main-content">
    <div class="card panel-card mb-4"><div class="card-body p-4">
      <h2 id="pageTitle" class="h3 text-primary mb-2">Offerte</h2>
      <p id="preferenceInfo" class="text-muted mb-0"></p>
    </div></div>

    <div id="feedback"></div>
    <div id="offersByCategory"></div>
  </main>

  <script>
    var apiBase = window.location.origin || "http://localhost:3000";
    var params = new URLSearchParams(window.location.search);
    var restaurantId = params.get("id");
    var allOffers = [];
    var userPreferences = [];

    function getIdAsString(idValue) {
      if (!idValue) return "";
      if (typeof idValue === "object" && idValue.$oid) return String(idValue.$oid);
      return String(idValue);
    }

    function readArrayFromLocalStorage(key) {
      try {
        var value = JSON.parse(localStorage.getItem(key) || "[]");
        return Array.isArray(value) ? value : [];
      } catch (error) {
        console.warn("Dati locali non validi per " + key + ":", error);
        return [];
      }
    }

    function getMealIdAsString(meal) {
      if (!meal) return "";
      var id = meal._id || meal.id || meal.idMeal;
      if (id && typeof id === "object" && id.$oid) return String(id.$oid);
      return id ? String(id) : "";
    }

    async function fetchWithAuth(url, options) {
      var token = localStorage.getItem("token");
      if (!token) { window.handleAuthIssue("sessione non valida"); return null; }
      var finalOptions = options || {};
      finalOptions.headers = finalOptions.headers || {};
      finalOptions.headers.Authorization = "Bearer " + token;
      var response = await fetch(url, finalOptions);
      if (response.status === 401) { window.handleAuthIssue("sessione non valida"); return null; }
      return response;
    }

    function normalizeMeal(meal) {
      var prezzo = Number(meal.prezzo || 0);
      var sconto = Number(meal.sconto_percentuale || 0);
      var prezzoScontato = Number(meal.prezzo_scontato || prezzo * (1 - sconto / 100));
      var mealId = getMealIdAsString(meal);
      var mealRestaurantId = getIdAsString(meal.ristorante_id) || restaurantId || "";
      return {
        _id: mealId,
        offerKey: (mealRestaurantId ? mealRestaurantId + "-" : "") + mealId,
        strMeal: meal.strMeal || "Piatto senza nome",
        strCategory: meal.strCategory || "Altre categorie",
        strArea: meal.strArea || "-",
        ingredients: Array.isArray(meal.ingredients) ? meal.ingredients.join(", ") : (meal.ingredients || "Non specificati"),
        strMealThumb: meal.strMealThumb || "../assets/logo.png",
        prezzo: prezzo,
        sconto_percentuale: sconto,
        prezzo_scontato: prezzoScontato,
        ristorante_id: mealRestaurantId,
        restaurantName: meal.restaurantName || ""
      };
    }

    function isMealAllowedByPreference(meal) {
      if (!userPreferences.length) return true;
      var mealCategory = String(meal.strCategory || "").toLowerCase();
      return userPreferences.some(function(preference) {
        return String(preference || "").toLowerCase() === mealCategory;
      });
    }

    async function addToCart(meal) {
      var qtyInput = document.getElementById("qty-" + (meal.offerKey || meal._id));
      var quantita = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      qtyInput.value = quantita;
      var payload = { meal_id: meal._id, nome: meal.strMeal, quantita: quantita, prezzo_unitario: meal.prezzo_scontato, prezzo_originale: meal.prezzo, in_offerta: true, sconto_percentuale: meal.sconto_percentuale, ristorante_id: meal.ristorante_id || restaurantId };
      try {
        var response = await fetchWithAuth(apiBase + "/carts/add", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        if (!response || !response.ok) throw new Error("Errore durante aggiunta al carrello");
        alert('"' + meal.strMeal + '" aggiunto al carrello al prezzo scontato!');
      } catch (err) { console.error(err); alert("Impossibile aggiungere il prodotto al carrello."); }
    }

    function renderGroupedOffers(meals) {
      var container = document.getElementById("offersByCategory");
      container.innerHTML = "";
      if (meals.length === 0) { container.innerHTML = '<div class="card panel-card"><div class="card-body p-4 text-muted">Nessuna offerta disponibile al momento.</div></div>'; return; }
      var grouped = meals.reduce(function(acc, meal) { (acc[meal.strCategory] ||= []).push(meal); return acc; }, {});
      Object.keys(grouped).sort().forEach(function(category) {
        var section = document.createElement("section"); section.className = "mb-4";
        section.innerHTML = '<h4 class="mb-3"><span class="category-title">' + category + '</span></h4>';
        var row = document.createElement("div"); row.className = "row g-4";
        grouped[category].forEach(function(meal) {
          var col = document.createElement("div"); col.className = "col-12 col-md-6 col-xl-4";
          col.innerHTML = '<article class="card menu-card in-offerta h-100">' +
            '<div class="menu-card-cover"><span class="offer-badge">-' + meal.sconto_percentuale + '% OFF</span><img src="' + meal.strMealThumb + '" class="card-img-top" alt="' + meal.strMeal + '"></div>' +
            '<div class="card-body d-flex flex-column"><span class="category-tag">' + meal.strCategory + '</span><h5 class="card-title text-primary">' + meal.strMeal + '</h5>' +
            (meal.restaurantName ? '<p class="mb-1"><b>Ristorante:</b> ' + meal.restaurantName + '</p>' : '') +
            '<p class="mb-1"><b>Area:</b> ' + meal.strArea + '</p><p class="mb-2"><b>Ingredienti:</b> ' + meal.ingredients + '</p>' +
            '<div class="offer-price-row"><span class="offer-old-price">€ ' + meal.prezzo.toFixed(2) + '</span><span class="offer-new-price">€ ' + meal.prezzo_scontato.toFixed(2) + '</span></div>' +
            '<div class="input-group mt-auto"><input type="number" class="form-control" id="qty-' + (meal.offerKey || meal._id) + '" min="1" value="1"><button class="btn btn-outline-offer" type="button" data-id="' + meal._id + '">Aggiungi</button></div></div></article>';
          col.querySelector("button").addEventListener("click", function() { addToCart(meal); });
          row.appendChild(col);
        });
        section.appendChild(row); container.appendChild(section);
      });
    }

    async function loadUserPreferences() {
      var res = await fetchWithAuth(apiBase + "/users/me");
      if (!res || !res.ok) return;
      var user = await res.json();
      userPreferences = Array.isArray(user.preferenze) ? user.preferenze.filter(Boolean) : [];
      var info = document.getElementById("preferenceInfo");
      info.textContent = userPreferences.length
        ? "Ti mostriamo solo le offerte delle categorie che hai impostato nelle tue preferenze alimentari."
        : "Non hai ancora preferenze alimentari: visualizzi tutte le offerte disponibili.";
    }

    async function loadOffers() {
      var feedback = document.getElementById("feedback");
      feedback.innerHTML = '<div class="alert alert-info">Caricamento offerte...</div>';
      try {
        await loadUserPreferences();
        var localOffers = readArrayFromLocalStorage("offerteBacheca").filter(function(meal) {
          if (!meal || !meal.in_offerta) return false;
          var offerRestaurantId = getIdAsString(meal.ristorante_id);
          return restaurantId ? offerRestaurantId === restaurantId : Boolean(offerRestaurantId);
        });
        var backendOffers = [];
        if (restaurantId) {
          var restaurantResponse = await fetchWithAuth(apiBase + "/restaurants/" + restaurantId);
          if (restaurantResponse && restaurantResponse.ok) {
            var restaurant = await restaurantResponse.json();
            if (restaurant && restaurant.name) document.getElementById("pageTitle").textContent = "Offerte di " + restaurant.name;
            backendOffers = (Array.isArray(restaurant.meals) ? restaurant.meals : [])
              .filter(function(meal) { return meal && meal.in_offerta; })
              .map(function(meal) {
                return Object.assign({}, meal, { ristorante_id: restaurantId });
              });
          }
        } else {
          var mealsResponse = await fetchWithAuth(apiBase + "/meals?in_offerta=true");
          if (mealsResponse && mealsResponse.ok) {
            var meals = await mealsResponse.json();
            var restaurantsResponse = await fetchWithAuth(apiBase + "/restaurants");
            var restaurants = [];
            if (restaurantsResponse && restaurantsResponse.ok) {
              restaurants = await restaurantsResponse.json();
              restaurants = Array.isArray(restaurants) ? restaurants : [];
            }

            backendOffers = (Array.isArray(meals) ? meals : [])
              .filter(function(meal) { return meal && meal.in_offerta; })
              .flatMap(function(meal) {
                var mealRestaurantId = getIdAsString(meal.ristorante_id);
                if (mealRestaurantId) return [meal];

                var mealId = getMealIdAsString(meal);
                var matchingRestaurants = restaurants.filter(function(restaurant) {
                  return Array.isArray(restaurant.menu) && restaurant.menu.map(getIdAsString).includes(mealId);
                });

                if (!matchingRestaurants.length) return [];

                return matchingRestaurants.map(function(restaurant) {
                  return Object.assign({}, meal, {
                    ristorante_id: getIdAsString(restaurant._id),
                    restaurantName: restaurant.name || ""
                  });
                });
              });
          }
        }
        var unique = new Map();
        backendOffers.concat(localOffers).forEach(function(meal, idx) {
          var normalized = normalizeMeal(meal);
          if (!isMealAllowedByPreference(normalized)) return;
          var id = normalized.offerKey || ((normalized.ristorante_id ? normalized.ristorante_id + "-" : "") + (normalized._id || (normalized.strMeal + "-" + idx)));
          unique.set(id, normalized);
        });
        allOffers = Array.from(unique.values());
        renderGroupedOffers(allOffers);
        feedback.innerHTML = allOffers.length ? "" : '<div class="alert alert-warning">Nessuna offerta disponibile per le tue preferenze alimentari.</div>';
      } catch (error) {
        console.error(error);
        feedback.innerHTML = '<div class="alert alert-danger">Errore durante il caricamento delle offerte.</div>';
      }
    }

    loadOffers();
  </script>
</body>
</html>
