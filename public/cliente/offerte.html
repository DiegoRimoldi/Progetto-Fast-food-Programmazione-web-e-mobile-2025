<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food - Offerte in Bacheca</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/modern-theme.css" />
  <link rel="stylesheet" href="../assets/responsive.css" />
  <link rel="icon" type="image/png" href="../assets/Favicon.png" />
  <script src="../assets/auth.js"></script>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; background: #fff; }
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #fff;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header { text-align: center; margin-bottom: 1rem; }
    .sidebar-header img { max-width: 150px; }
    .sidebar .nav-link { color: #555; border-radius: .5rem; margin-bottom: .35rem; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: #0d6efd; color: #fff; }
    .main-content { flex: 1; padding: 2rem; }
    .offer-card { border: 2px solid #ffc107; box-shadow: 0 8px 20px rgba(255, 193, 7, 0.2); position: relative; }
    .offer-badge { position: absolute; top: 10px; right: 10px; background: #dc3545; color: #fff; font-weight: 700; border-radius: 12px; padding: .2rem .65rem; }
    .old-price { text-decoration: line-through; color: #6c757d; margin-bottom: 0; }
    .discount-price { color: #dc3545; font-weight: 700; font-size: 1.1rem; margin-bottom: .75rem; }
    .meal-img { height: 200px; object-fit: cover; }
  </style>
</head>
<body>
  <script>window.ensureAuthenticatedRole("cliente");</script>

  <aside class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" aria-label="Torna alla home"><img src="../assets/logo.png" alt="FastFood Logo" /></a>
    </div>
    <a href="home.html" class="nav-link">Home</a>
    <a href="carrello.html" class="nav-link">Carrello</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="offerte.html" class="nav-link active">Offerte</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </aside>

  <main class="main-content">
    <h2 id="pageTitle" class="text-primary mb-3">Offerte</h2>

    <div class="row g-2 mb-4">
      <div class="col-md-4"><input type="text" id="filterName" class="form-control" placeholder="Cerca per nome" /></div>
      <div class="col-md-3"><select id="filterCategory" class="form-select"><option value="">Tutte le categorie</option></select></div>
      <div class="col-md-2"><input type="number" id="filterPriceMin" class="form-control" min="0" step="0.01" placeholder="Min €" /></div>
      <div class="col-md-2"><input type="number" id="filterPriceMax" class="form-control" min="0" step="0.01" placeholder="Max €" /></div>
      <div class="col-md-1"><button id="applyFilter" class="btn btn-warning w-100">Cerca</button></div>
    </div>

    <div id="feedback"></div>
    <div id="offersByCategory"></div>
  </main>

  <script>
    var apiBase = "http://localhost:3000";
    var params = new URLSearchParams(window.location.search);
    var restaurantId = params.get("id");
    var allOffers = [];

    function getMealIdAsString(meal) {
      if (!meal) return "";
      var id = meal._id || meal.id || meal.idMeal;
      if (id && typeof id === "object" && id.$oid) return String(id.$oid);
      return id ? String(id) : "";
    }

    async function fetchWithAuth(url, options) {
      var token = localStorage.getItem("token");
      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return null;
      }
      var finalOptions = options || {};
      finalOptions.headers = finalOptions.headers || {};
      finalOptions.headers.Authorization = "Bearer " + token;

      var response = await fetch(url, finalOptions);
      if (response.status === 401) {
        window.handleAuthIssue("sessione non valida");
        return null;
      }
      return response;
    }

    function normalizeMeal(meal) {
      var prezzo = Number(meal.prezzo || 0);
      var sconto = Number(meal.sconto_percentuale || 0);
      var prezzoScontato = Number(meal.prezzo_scontato || prezzo * (1 - sconto / 100));
      var mealId = getMealIdAsString(meal);
      return {
        _id: mealId,
        strMeal: meal.strMeal || "Piatto senza nome",
        strCategory: meal.strCategory || "Altre categorie",
        strArea: meal.strArea || "-",
        ingredients: meal.ingredients || "Non specificati",
        strMealThumb: meal.strMealThumb || "../assets/logo.png",
        prezzo: prezzo,
        sconto_percentuale: sconto,
        prezzo_scontato: prezzoScontato,
        ristorante_id: meal.ristorante_id || restaurantId || ""
      };
    }

    function updateCategories(meals) {
      var select = document.getElementById("filterCategory");
      select.innerHTML = '<option value="">Tutte le categorie</option>';
      Array.from(new Set(meals.map(function(m) { return m.strCategory; }))).sort().forEach(function(cat) {
        var option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        select.appendChild(option);
      });
    }

    async function addToCart(meal) {
      var qtyInput = document.getElementById("qty-" + meal._id);
      var quantita = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      qtyInput.value = quantita;

      var payload = {
        meal_id: meal._id,
        nome: meal.strMeal,
        quantita: quantita,
        prezzo_unitario: meal.prezzo_scontato,
        ristorante_id: meal.ristorante_id || restaurantId
      };

      try {
        var response = await fetchWithAuth(apiBase + "/carts/add", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!response || !response.ok) throw new Error("Errore durante aggiunta al carrello");
        alert('"' + meal.strMeal + '" aggiunto al carrello!');
      } catch (err) {
        console.error(err);
        alert("Impossibile aggiungere il prodotto al carrello.");
      }
    }

    function renderGroupedOffers(meals) {
      var container = document.getElementById("offersByCategory");
      container.innerHTML = "";
      if (meals.length === 0) {
        container.innerHTML = '<p class="text-muted">Nessuna offerta trovata.</p>';
        return;
      }

      var grouped = meals.reduce(function(acc, meal) {
        if (!acc[meal.strCategory]) acc[meal.strCategory] = [];
        acc[meal.strCategory].push(meal);
        return acc;
      }, {});

      Object.keys(grouped).sort().forEach(function(category) {
        var section = document.createElement("section");
        section.className = "mb-4";

        var heading = document.createElement("h4");
        heading.className = "text-primary mb-3";
        heading.textContent = category;
        section.appendChild(heading);

        var row = document.createElement("div");
        row.className = "row g-4";

        grouped[category].forEach(function(meal) {
          var col = document.createElement("div");
          col.className = "col-md-4";

          var card = document.createElement("div");
          card.className = "card offer-card h-100";

          var badge = document.createElement("span");
          badge.className = "offer-badge";
          badge.textContent = "-" + meal.sconto_percentuale + "%";
          card.appendChild(badge);

          var img = document.createElement("img");
          img.className = "card-img-top meal-img";
          img.src = meal.strMealThumb;
          img.alt = meal.strMeal;
          card.appendChild(img);

          var body = document.createElement("div");
          body.className = "card-body d-flex flex-column";
          body.innerHTML = '<h5 class="card-title text-primary">' + meal.strMeal + '</h5>' +
                           '<p class="mb-1"><b>Area:</b> ' + meal.strArea + '</p>' +
                           '<p class="mb-2"><b>Ingredienti:</b> ' + meal.ingredients + '</p>';

          var oldPrice = document.createElement("p");
          oldPrice.className = "old-price";
          oldPrice.textContent = "€ " + meal.prezzo.toFixed(2);

          var newPrice = document.createElement("p");
          newPrice.className = "discount-price";
          newPrice.textContent = "€ " + meal.prezzo_scontato.toFixed(2);

          var inputGroup = document.createElement("div");
          inputGroup.className = "input-group mt-auto";

          var qty = document.createElement("input");
          qty.type = "number";
          qty.className = "form-control";
          qty.id = "qty-" + meal._id;
          qty.min = "1";
          qty.value = "1";

          var button = document.createElement("button");
          button.className = "btn btn-outline-secondary";
          button.textContent = "Aggiungi";
          button.addEventListener("click", function() { addToCart(meal); });

          inputGroup.appendChild(qty);
          inputGroup.appendChild(button);

          body.appendChild(oldPrice);
          body.appendChild(newPrice);
          body.appendChild(inputGroup);
          card.appendChild(body);
          col.appendChild(card);
          row.appendChild(col);
        });

        section.appendChild(row);
        container.appendChild(section);
      });
    }

    function applyFilters() {
      var name = document.getElementById("filterName").value.trim().toLowerCase();
      var category = document.getElementById("filterCategory").value;
      var min = parseFloat(document.getElementById("filterPriceMin").value);
      var max = parseFloat(document.getElementById("filterPriceMax").value);

      var filtered = allOffers.filter(function(meal) {
        var byName = !name || meal.strMeal.toLowerCase().includes(name);
        var byCategory = !category || meal.strCategory === category;
        var price = meal.prezzo_scontato;
        var byMin = Number.isNaN(min) || price >= min;
        var byMax = Number.isNaN(max) || price <= max;
        return byName && byCategory && byMin && byMax;
      });

      renderGroupedOffers(filtered);
    }

    async function loadOffers() {
      var feedback = document.getElementById("feedback");
      feedback.innerHTML = '<div class="alert alert-info">Caricamento offerte...</div>';
      try {
        var localOffers = JSON.parse(localStorage.getItem("offerteBacheca") || "[]")
          .filter(function(meal) { return meal && meal.in_offerta; });

        var backendOffers = [];
        if (restaurantId) {
          var restaurantResponse = await fetchWithAuth(apiBase + "/restaurants/" + restaurantId);
          if (restaurantResponse && restaurantResponse.ok) {
            var restaurant = await restaurantResponse.json();
            if (restaurant && restaurant.name) {
              document.getElementById("pageTitle").textContent = "Offerte di " + restaurant.name;
            }
          }

          var mealsResponse = await fetchWithAuth(apiBase + "/meals?ristorante_id=" + restaurantId);
          if (mealsResponse && mealsResponse.ok) {
            var meals = await mealsResponse.json();
            backendOffers = (Array.isArray(meals) ? meals : []).filter(function(meal) { return meal && meal.in_offerta; });
          }
        }

        var unique = new Map();
        backendOffers.concat(localOffers).forEach(function(meal, idx) {
          var id = getMealIdAsString(meal) || (meal.strMeal + "-" + idx);
          unique.set(id, normalizeMeal(meal));
        });

        allOffers = Array.from(unique.values());
        updateCategories(allOffers);
        renderGroupedOffers(allOffers);

        feedback.innerHTML = allOffers.length ? "" : '<div class="alert alert-warning">Nessuna offerta disponibile.</div>';
      } catch (error) {
        console.error(error);
        feedback.innerHTML = '<div class="alert alert-danger">Errore durante il caricamento delle offerte.</div>';
      }
    }

    document.getElementById("applyFilter").addEventListener("click", applyFilters);
    loadOffers();
  </script>
</body>
</html>
