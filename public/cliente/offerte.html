<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Offerte</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="../assets/modern-theme.css"><script src="../assets/auth.js"></script></head><body><script>window.ensureAuthenticatedRole('cliente');</script><div class='container py-4'><h2 class='text-primary'>Offerte in Bacheca</h2><div id='content' class='row g-3'></div></div><script>const apiBase='http://localhost:3000';async function f(u,o={}){const t=localStorage.getItem('token');o.headers=o.headers||{};o.headers.Authorization='Bearer '+t;return fetch(u,o)}function prezzoOfferta(m){if(m.prezzo_scontato!==undefined&&m.prezzo_scontato!==null&&m.prezzo_scontato!==''){return Number(m.prezzo_scontato)}return Number(m.prezzo||0)*(1-Number(m.sconto_percentuale||0)/100)}async function load(){const user=await (await f(apiBase+'/users/me')).json();const pref=Array.isArray(user.preferenze)?user.preferenze:[];const rid=new URLSearchParams(location.search).get('id');const meals=await (await f(apiBase+'/meals'+(rid?('?ristorante_id='+rid):''))).json();const by={};(meals||[]).filter(m=>m.in_offerta&&(!pref.length||pref.includes(m.strCategory))).forEach(m=>{const c=m.strCategory||'Altro';(by[c]=by[c]||[]).push(m)});const c=document.getElementById('content');c.innerHTML='';Object.keys(by).sort().forEach(cat=>{const d=document.createElement('div');d.className='col-12';d.innerHTML=`<div class='card'><div class='card-header bg-warning fw-bold'>${cat}</div><div class='card-body'><div class='row g-3'>${by[cat].map(m=>`<div class='col-md-6 col-lg-4'><div class='card h-100'><img src='${m.strMealThumb||''}' class='card-img-top' style='height:180px;object-fit:cover'><div class='card-body'><h5 class='text-primary'>${m.strMeal}</h5><p><del>€${Number(m.prezzo||0).toFixed(2)}</del> <strong class='text-danger'>€${prezzoOfferta(m).toFixed(2)}</strong></p></div></div></div>`).join('')}</div></div></div>`;c.appendChild(d)});if(!Object.keys(by).length)c.innerHTML='<p class="text-muted">Nessuna offerta disponibile per le tue preferenze.</p>';}load();</script></body></html>
