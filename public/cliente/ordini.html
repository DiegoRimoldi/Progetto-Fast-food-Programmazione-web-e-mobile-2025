<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FastFood - Ordini Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <link rel="stylesheet" href="../assets/responsive.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar styling */
    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }
    .main-content {
      flex: 1;
      padding: 2rem;
    }
    .main-content h2 {
      color: #0d6efd;
      margin-bottom: 1.5rem;
    }
    .order-card {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      padding: 1rem;
      margin-bottom: 1rem;
      background-color: #fff;
    }
    .order-card p {
      margin: 0.25rem 0;
    }
    .btn-confirm {
      background-color: #0d6efd;
      color: white;
      border-radius: 0.375rem;
      padding: 0.5rem;
      margin-top: 0.5rem;
    }
    .order-details {
      margin-top: 0.75rem;
      border-top: 1px dashed #dee2e6;
      padding-top: 0.75rem;
    }
    .order-details summary {
      cursor: pointer;
      color: #0d6efd;
      font-weight: 600;
    }
    .meals-list {
      margin: 0.75rem 0 0;
      padding-left: 1rem;
    }
    .meal-item {
      margin-bottom: 0.5rem;
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("cliente");
  </script>

  <div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link">Home</a>
    <a href="carrello.html" class="nav-link">Carrello</a>
    <a href="ordini.html" class="nav-link active">Ordini</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>

  </div>

  <div class="main-content">
    <h2>I tuoi Ordini</h2>
    <br><hr><br>
    <h3>Ordini Attivi</h3>
    <br>
    <div id="activeOrders"></div>
    <br><hr><br>
    <h3>Storico Ordini</h3>
    <br>
    <div id="historyOrders"></div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    async function fetchConControlloToken(url, options = {}) {
      const token = localStorage.getItem("token");

      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return null;
      }

      options.headers = {
        ...(options.headers || {}),
        Authorization: `Bearer ${token}`
      };

      try {
        let response = await fetch(url, options);

        if (response.status === 401) { // token scaduto o invalido
          window.handleAuthIssue("sessione non valida");
        }

        return response;
      } catch (error) {
        console.error("Errore nella richiesta API:", error);
        return null;
      }
    }

    function formatEuro(value) {
      return "€" + Number(value || 0).toFixed(2);
    }

    function creaDettagliPasti(order) {
      if (!Array.isArray(order.meals) || order.meals.length === 0) {
        return "<p class='text-muted mb-0'>Dettaglio prodotti non disponibile.</p>";
      }

      var righePasti = order.meals.map(meal => {
        var quantita = Number(meal.quantita || 0);
        var prezzoUnitario = Number(meal.prezzo_unitario || 0);
        var subtotale = quantita * prezzoUnitario;
        var tempoPreparazione = meal.tempo_preparazione ? `${meal.tempo_preparazione} min` : "N/D";

        return `
          <li class="meal-item">
            <strong>${meal.nome || "Piatto non specificato"}</strong><br>
            Quantità: ${quantita} • Prezzo unitario: ${formatEuro(prezzoUnitario)} • Subtotale: ${formatEuro(subtotale)}<br>
            Tempo preparazione stimato: ${tempoPreparazione}
          </li>
        `;
      }).join("");

      return `<ul class="meals-list">${righePasti}</ul>`;
    }

    function creaCardOrdine(order) {
      var orderDiv = document.createElement("div");
      orderDiv.className = "order-card";

      var consegnaDettagli = "";
      if (order.metodo_consegna === "Consegna a domicilio") {
        consegnaDettagli = `
          <p>Indirizzo consegna: ${order.indirizzo_consegna || "Non specificato"}</p>
          <p>Distanza: ${order.distanza_km ? order.distanza_km + " km" : "N/D"}</p>
          <p>Costo consegna: ${formatEuro(order.costo_consegna)}</p>
        `;
      }

      orderDiv.innerHTML = `
        <p><strong>Ordine #${order._id}</strong></p>
        <p>Ristorante: ${order.ristorante_nome}</p>
        <p>Totale: ${formatEuro(order.totale)}</p>
        <p>Data ordine: ${order.data_ordine}</p>
        <p>Metodo consegna: ${order.metodo_consegna || "N/D"}</p>
        ${consegnaDettagli}
        <p>Tempo di attesa: ${order.tempo_attesa} min</p>
        <p>Stato: <strong>${order.stato}</strong></p>
        <details class="order-details">
          <summary>Vedi dettaglio ordine</summary>
          ${creaDettagliPasti(order)}
        </details>
      `;

      return orderDiv;
    }

    function parseDataOrdine(dataOrdine) {
      if (!dataOrdine || typeof dataOrdine !== "string") return 0;
      var match = dataOrdine.match(/^(\d{2})\/(\d{2})\/(\d{4})\s-\s(\d{2}):(\d{2})$/);
      if (!match) return 0;
      var giorno = Number(match[1]);
      var mese = Number(match[2]) - 1;
      var anno = Number(match[3]);
      var ora = Number(match[4]);
      var minuto = Number(match[5]);
      return new Date(anno, mese, giorno, ora, minuto).getTime();
    }

    async function caricaOrdiniCliente() {
      try {
        var response = await fetchConControlloToken(apiBase + "/orders");

        if (!response || !response.ok) {
          throw new Error("Impossibile recuperare gli ordini.");
        }

        var orders = await response.json();
        var activeOrders = document.getElementById("activeOrders");
        var historyOrders = document.getElementById("historyOrders");

        activeOrders.innerHTML = "";
        historyOrders.innerHTML = "";

        let ordiniAttiviPresenti = false;
        let storicoVuoto = true;

        orders.sort((a, b) => parseDataOrdine(b.data_ordine) - parseDataOrdine(a.data_ordine));

        orders.forEach(order => {
          var orderDiv = creaCardOrdine(order);

          if (order.stato === "in consegna" && order.metodo_consegna === "Consegna a domicilio") {
            var confirmBtn = document.createElement("button");
            confirmBtn.className = "btn btn-confirm";
            confirmBtn.innerText = "Conferma Consegna";
            confirmBtn.onclick = () => confermaConsegna(order._id, confirmBtn);
            orderDiv.appendChild(confirmBtn);
          }

          if (["in preparazione", "ordinato", "in consegna"].includes(order.stato)) {
            activeOrders.appendChild(orderDiv);
            ordiniAttiviPresenti = true;
          } else {
            historyOrders.appendChild(orderDiv);
            storicoVuoto = false;
          }
        });

        if (!ordiniAttiviPresenti) {
          activeOrders.innerHTML = '<p class="text-muted">Non hai ordini attivi.</p>';
        }

        if (storicoVuoto) {
          historyOrders.innerHTML = '<p class="text-muted">Non hai ordini completati.</p>';
        }

      } catch (err) {
        console.error("Errore nel caricamento degli ordini:", err);
      }
    }


    async function confermaConsegna(orderId, buttonElement) {
      try {
        if (buttonElement) {
          buttonElement.disabled = true;
          buttonElement.innerText = "Conferma in corso...";
        }

        var response = await fetchConControlloToken(`${apiBase}/orders/${orderId}/consegna`, {
          method: "PUT",
        });

        if (!response || !response.ok) {
          const errorPayload = response ? await response.json().catch(() => null) : null;
          const errorMessage = errorPayload?.error || "Errore nella conferma consegna.";
          throw new Error(errorMessage);
        }

        alert("Consegna confermata correttamente.");

        caricaOrdiniCliente();
      } catch (err) {
        console.error("Errore:", err);
        alert(err.message || "Non è stato possibile confermare la consegna.");
        if (buttonElement) {
          buttonElement.disabled = false;
          buttonElement.innerText = "Conferma Consegna";
        }
      }
    }

    caricaOrdiniCliente();
  </script>
</body>
</html>
