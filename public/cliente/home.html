<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food - Home Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <link rel="stylesheet" href="../assets/responsive.css" />
  <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
  <style>
    :root { --brand-primary: #0d6efd; --surface: #ffffff; }
    body { margin: 0; padding: 0; background: linear-gradient(180deg, #f3f8ff 0%, #eefbf8 100%); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; min-height: 100vh; }
    .sidebar { width: clamp(190px, 22vw, 250px); flex: 0 0 clamp(190px, 22vw, 250px); background: var(--surface); border-right: 1px solid rgba(0,0,0,.05); box-shadow: 2px 0 20px rgba(15,23,42,.08); padding: 1.25rem 1rem; display: flex; flex-direction: column; position: sticky; top: 0; align-self: flex-start; height: 100vh; overflow-y: auto; }
    .sidebar-header { text-align: center; margin-bottom: 1.25rem; }
    .sidebar-header img { max-width: 150px; }
    .sidebar a.nav-link { color: #4b5563; padding: .72rem .9rem; border-radius: .75rem; margin-bottom: .4rem; font-weight: 500; }
    .sidebar a.nav-link.active,.sidebar a.nav-link:hover { background: linear-gradient(120deg, var(--brand-primary) 0%, #6ea8fe 100%); color: #fff; }
    .main-content { flex: 1; padding: clamp(1.25rem, 2.5vw, 2.25rem); }
    .hero-card,.section-card,.ristorante-card,.menu-card { border: none; border-radius: 1rem; box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08); background: linear-gradient(120deg, #ffffff 0%, #f8fbff 100%); }
    .ristorante-card { overflow: hidden; transition: transform .2s ease, box-shadow .2s ease; }
    .ristorante-card:hover,.menu-card:hover { transform: translateY(-3px); box-shadow: 0 18px 34px rgba(15,23,42,.12); }
    .ristorante-card img,.menu-card img { height: 210px; object-fit: cover; }
    .menu-card { overflow: hidden; }
    .menu-card.in-offerta { background: linear-gradient(160deg, #ffffff 0%, #f2fff8 100%); outline: 2px solid rgba(25, 135, 84, 0.35); }
    .offer-badge { position: absolute; top: .9rem; left: .9rem; background: linear-gradient(120deg, #198754 0%, #20c997 100%); color: #fff; font-weight: 700; font-size: .78rem; border-radius: 999px; padding: .35rem .75rem; }
    .menu-card-cover { position: relative; }
    .offer-old-price { text-decoration: line-through; color: #6c757d; font-size: .9rem; margin-bottom: 0; }
    .offer-new-price { color: #146c43; font-weight: 700; font-size: 1.05rem; margin-bottom: .75rem; }
  </style>
</head>
<body>
  <script>window.ensureAuthenticatedRole("cliente");</script>
  <aside class="sidebar">
    <div class="sidebar-header"><a href="../index.html"><img src="../assets/logo.png" alt="FastFood Logo" /></a></div>
    <a href="home.html" class="nav-link active">Home</a><a href="carrello.html" class="nav-link">Carrello</a><a href="ordini.html" class="nav-link">Ordini</a><a href="offerte.html" class="nav-link">Offerte</a><a href="../profilo.html" class="nav-link">Profilo</a><a href="../logout.html" class="nav-link">Logout</a>
  </aside>
  <main class="main-content">
    <div class="card hero-card mb-4"><div class="card-body p-4"><h2 class="h3 text-primary mb-2">Benvenuto!</h2><p class="text-muted mb-0">Scopri ristoranti e offerte in linea con le tue preferenze alimentari.</p></div></div>

    <section class="card section-card mb-4"><div class="card-body p-4"><h3 class="h5 text-primary mb-3">Offerte consigliate per te</h3><div id="offersFeedback" class="text-muted mb-3"></div><div id="offersContainer" class="row g-4"></div></div></section>

    <h3 class="h4 text-primary mb-3">Ristoranti Disponibili</h3>
    <div class="row g-2 mb-3"><div class="col-md-6"><input type="text" id="searchByName" class="form-control" placeholder="Cerca per nome ristorante..." /></div><div class="col-md-6"><input type="text" id="searchByAddress" class="form-control" placeholder="Cerca per indirizzo..." /></div></div>
    <div id="ristorantiContainer" class="row g-4"></div>
  </main>

  <script>
    var apiBase = "http://localhost:3000";
    var defaultRestaurantImage = "../assets/restaurant-placeholder.svg";

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");
      if (!token) { window.handleAuthIssue("sessione non valida"); return null; }
      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;
      try { var response = await fetch(url, options); if (response.status === 401) window.handleAuthIssue("sessione non valida"); return response; } catch (error) { console.error("Errore API:", error); return null; }
    }

    async function ricercaRistoranti(queryName, queryAddress) {
      var response = await fetchConControlloToken(`${apiBase}/restaurants/search?q=${encodeURIComponent(queryName)}&address=${encodeURIComponent(queryAddress)}`);
      if (!response || !response.ok) return;
      var data = await response.json(); mostraRistoranti(data.restaurants || []);
    }

    function mostraRistoranti(lista) {
      var container = document.getElementById("ristorantiContainer"); container.innerHTML = "";
      if (!lista.length) { container.innerHTML = '<p class="text-muted">Nessun ristorante trovato.</p>'; return; }
      lista.forEach(function(r) {
        var col = document.createElement("div"); col.className = "col-12 col-md-6 col-xl-4";
        col.innerHTML = '<div class="card ristorante-card h-100"><img src="' + (r.image || defaultRestaurantImage) + '" class="card-img-top" alt="Foto del ristorante"><div class="card-body d-flex flex-column"><h5 class="card-title text-primary">' + r.name + '</h5><p class="text-muted">' + (r.address || "Indirizzo non disponibile") + '</p><div class="d-flex gap-2 mt-auto"><a href="menu.html?id=' + r._id + '" class="btn btn-primary">Vedi Menù</a><a href="offerte.html?id=' + r._id + '" class="btn btn-outline-primary">Vedi Offerte</a></div></div></div>';
        container.appendChild(col);
      });
    }

    async function caricaOffertePreferite() {
      var feedback = document.getElementById("offersFeedback");
      var container = document.getElementById("offersContainer");
      container.innerHTML = "";

      var userRes = await fetchConControlloToken(apiBase + "/users/me");
      if (!userRes || !userRes.ok) { feedback.textContent = "Impossibile caricare le offerte consigliate."; return; }
      var user = await userRes.json();
      var preferenze = Array.isArray(user.preferenze) ? user.preferenze.filter(Boolean) : [];

      if (!preferenze.length) { feedback.textContent = "Aggiungi preferenze alimentari nel profilo per ricevere offerte su misura."; return; }

      var query = preferenze.map(function(cat) { return "strCategory=" + encodeURIComponent(cat); }).join("&");
      var mealsRes = await fetchConControlloToken(apiBase + "/meals?in_offerta=true&" + query);
      if (!mealsRes || !mealsRes.ok) { feedback.textContent = "Nessuna offerta disponibile in questo momento."; return; }
      var offerte = await mealsRes.json();

      if (!offerte.length) { feedback.textContent = "Nessuna offerta presente per le tue categorie preferite."; return; }
      feedback.textContent = "Ti mostriamo i piatti in offerta che rispettano le tue preferenze.";

      offerte.forEach(function(meal) {
        var col = document.createElement("div"); col.className = "col-12 col-md-6 col-xl-4";
        var prezzoBase = Number(meal.prezzo || 0); var prezzoScontato = Number(meal.prezzo_scontato || prezzoBase);
        col.innerHTML = '<div class="card menu-card in-offerta h-100"><div class="menu-card-cover"><span class="offer-badge">-' + (meal.sconto_percentuale || 0) + '%</span><img src="' + (meal.strMealThumb || '../assets/logo.png') + '" class="card-img-top" alt="' + (meal.strMeal || 'Piatto') + '"></div><div class="card-body d-flex flex-column"><h5 class="card-title text-primary">' + meal.strMeal + '</h5><p class="mb-1"><b>Categoria:</b> ' + (meal.strCategory || '-') + '</p><p class="mb-1"><b>Area:</b> ' + (meal.strArea || '-') + '</p><p class="mb-2"><b>Ingredienti:</b> ' + ((meal.ingredients || []).join(', ')) + '</p><p class="offer-old-price">€ ' + prezzoBase.toFixed(2) + '</p><p class="offer-new-price">€ ' + prezzoScontato.toFixed(2) + '</p><div class="input-group mt-auto"><input type="number" min="1" value="1" id="qty-off-' + meal._id + '" class="form-control"><button class="btn btn-outline-secondary" onclick="addToCartOfferta(\'' + meal._id + '\',\'' + meal.strMeal.replace(/'/g, "") + '\',' + prezzoScontato + ',\'' + meal.ristorante_id + '\')">Aggiungi</button></div></div></div>';
        container.appendChild(col);
      });
    }

    async function addToCartOfferta(id, nome, prezzoScontato, ristoranteId) {
      var qtyInput = document.getElementById("qty-off-" + id);
      var quantita = Math.max(1, parseInt(qtyInput.value, 10) || 1);
      var payload = { meal_id: id, nome: nome, quantita: quantita, prezzo_unitario: Number(prezzoScontato), ristorante_id: ristoranteId };
      var response = await fetchConControlloToken(apiBase + "/carts/add", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
      if (!response || !response.ok) { alert("Impossibile aggiungere il prodotto al carrello."); return; }
      alert('"' + nome + '" aggiunto al carrello al prezzo scontato!');
    }

    document.getElementById("searchByName").addEventListener("input", function() { ricercaRistoranti(this.value.trim(), document.getElementById("searchByAddress").value.trim()); });
    document.getElementById("searchByAddress").addEventListener("input", function() { ricercaRistoranti(document.getElementById("searchByName").value.trim(), this.value.trim()); });

    ricercaRistoranti("", "");
    caricaOffertePreferite();
  </script>
</body>
</html>
