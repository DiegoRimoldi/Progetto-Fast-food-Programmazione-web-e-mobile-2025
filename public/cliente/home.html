<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fast Food - Home Cliente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/modern-theme.css">
  <link rel="stylesheet" href="../assets/responsive.css" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(165deg, #f6f9ff 0%, #ffffff 45%, #f4f8ff 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: clamp(180px, 22vw, 250px);
      flex: 0 0 clamp(180px, 22vw, 250px);
      background-color: #ffffff;
      box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      align-self: flex-start;
      height: 100vh;
      overflow-y: auto;
    }
    .sidebar-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    .sidebar-logo-link {
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .sidebar-logo-link:hover {
      transform: scale(1.03);
    }
    .sidebar-header img {
      max-width: 150px;
    }
    .sidebar a.nav-link {
      color: #555;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar a.nav-link.active {
      background-color: #0d6efd;
      color: #fff;
    }
    .sidebar a.nav-link:hover {
      background-color: #0b5ed7;
      color: #fff;
    }

    .main-content {
      flex: 1;
      padding: 2.25rem;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }
    .main-content h2 {
      color: #0d6efd;
      margin-bottom: 1.1rem;
      font-weight: 700;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .search-bar input {
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      padding: 0.75rem;
      font-size: 1rem;
      flex: 1;
    }
    .bacheca-offerte {
      background: #fff;
      border: 1px solid #dde7f8;
      border-radius: 1rem;
      box-shadow: 0 8px 20px rgba(13, 110, 253, 0.08);
      padding: 1.1rem 1.2rem;
      margin-bottom: 1.25rem;
    }
    .bacheca-offerte h3 {
      color: #0d6efd;
      font-size: 1.1rem;
      margin: 0 0 0.6rem 0;
      font-weight: 700;
    }
    .offerta-item {
      border: 1px solid #e8eef9;
      border-radius: 0.8rem;
      padding: 0.8rem;
      height: 100%;
      background: #fcfdff;
    }
    .offerta-item .badge {
      font-size: 0.72rem;
    }

    .ristorante-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid #dde7f8;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(13, 110, 253, 0.12);
      max-width: 460px;
      margin: 0 auto;
      background: #fff;
    }
    .ristorante-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 32px rgba(13, 110, 253, 0.2);
    }
    .ristorante-card .ristorante-photo-wrapper {
      position: relative;
    }
    .ristorante-card img {
      height: 220px;
      object-fit: cover;
      width: 100%;
    }
    .ristorante-card .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(7, 19, 38, 0.08) 0%, rgba(7, 19, 38, 0.6) 100%);
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 0.9rem;
    }
    .ristorante-card .photo-badge {
      background: rgba(255, 255, 255, 0.92);
      color: #0d6efd;
      font-size: 0.75rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
      border: 1px solid rgba(13, 110, 253, 0.2);
    }
    .ristorante-card .card-body {
      background-color: #fff;
      padding: 1.25rem;
    }
    .ristorante-card .card-title {
      color: #0d6efd;
      font-weight: bold;
      font-size: 1.2rem;
      margin-bottom: 0.8rem;
    }
    .ristorante-card .card-text {
      font-size: 0.96rem;
      margin-bottom: 1.1rem;
      color: #4b5563;
    }
    .ristorante-card .btn {
      background: linear-gradient(135deg, #0d6efd, #1c7dff);
      color: #fff;
      border: none;
      border-radius: 0.55rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 0.55rem 0.9rem;
    }
    .ristorante-card .btn:hover {
      background: linear-gradient(135deg, #0b5ed7, #176ce0);
    }
  </style>
    <link rel="icon" type="image/png" href="../assets/Favicon.png">
  <script src="../assets/auth.js"></script>
</head>
<body>
  <script>
    window.ensureAuthenticatedRole("cliente");
  </script>

  <div class="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo-link" aria-label="Torna alla home">
      <img src="../assets/logo.png" alt="FastFood Logo" />
      </a>
    </div>
    <a href="home.html" class="nav-link active">Home</a>
    <a href="carrello.html" class="nav-link">Carrello</a>
    <a href="ordini.html" class="nav-link">Ordini</a>
    <a href="../profilo.html" class="nav-link">Profilo</a>
    <a href="../logout.html" class="nav-link">Logout</a>
  </div>

  <div class="main-content">
    <h2>Ristoranti Disponibili</h2>
    <section class="bacheca-offerte">
      <h3>Bacheca offerte per te</h3>
      <div id="offerteContainer" class="row g-3">
        <p class="text-muted mb-0">Caricamento offerte personalizzate...</p>
      </div>
    </section>
    <div class="search-bar">
      <input type="text" id="searchByName" class="form-control" placeholder="Cerca per nome ristorante..." />
      <input type="text" id="searchByAddress" class="form-control" placeholder="Cerca per indirizzo..." />
    </div>
    <div id="ristorantiContainer" class="row g-4">
    </div>
  </div>

  <script>
    var apiBase = "http://localhost:3000";
    var defaultRestaurantImage = "../assets/restaurant-placeholder.svg";
    var userPreferences = [];
    var restaurantsById = {};

    async function fetchConControlloToken(url, options = {}) {
      var token = localStorage.getItem("token");
      if (!token) {
        window.handleAuthIssue("sessione non valida");
        return;
      }
      options.headers = options.headers || {};
      options.headers["Authorization"] = "Bearer " + token;
      try {
        let response = await fetch(url, options);
        if (response.status === 401) {
          window.handleAuthIssue("sessione non valida");
        }
        return response;
      } catch (error) {
        console.error("Errore API:", error);
        return null;
      }
    }

    async function ricercaRistoranti(queryName, queryAddress) {
      try {
        var response = await fetchConControlloToken(
          `${apiBase}/restaurants/search?q=${encodeURIComponent(queryName)}&address=${encodeURIComponent(queryAddress)}`
        );
        if (!response || !response.ok) throw new Error("Errore nella ricerca dei ristoranti.");
        var data = await response.json();
        mostraRistoranti(data.restaurants);
      } catch (err) {
        console.error("Errore nella ricerca:", err);
      }
    }


    function inferenzaTipologiaPiatto(piatto) {
      var categoria = String((piatto && piatto.strCategory) || "").toLowerCase();
      var ingredienti = Array.isArray(piatto && piatto.ingredients)
        ? piatto.ingredients.join(" ").toLowerCase()
        : "";

      if (/fish|seafood|salmon|tuna|shrimp|prawn|cod|octopus|sard/i.test(categoria + " " + ingredienti)) return "pesce";
      if (/vegetarian|vegan|pasta|dessert|salad|risotto|tofu|mushroom|cheese|eggplant|zucchini/i.test(categoria + " " + ingredienti)) return "vegetariano";
      if (/beef|chicken|lamb|pork|goat|meat|bacon|ham|sausage/i.test(categoria + " " + ingredienti)) return "carne";
      return null;
    }

    function mostraOffertePersonalizzate(piatti) {
      var container = document.getElementById("offerteContainer");
      container.innerHTML = "";

      if (!userPreferences.length) {
        container.innerHTML = '<p class="text-muted mb-0">Aggiungi le tue preferenze nel profilo per vedere offerte personalizzate.</p>';
        return;
      }

      if (!piatti.length) {
        container.innerHTML = '<p class="text-muted mb-0">Al momento non ci sono offerte nelle categorie che hai selezionato.</p>';
        return;
      }

      piatti.forEach(function(piatto) {
        var col = document.createElement("div");
        var restaurant = restaurantsById[piatto.ristorante_id] || {};
        col.className = "col-12 col-md-6 col-xl-4";
        col.innerHTML = '<div class="offerta-item">' +
          '<div class="d-flex justify-content-between align-items-start gap-2 mb-2">' +
            '<strong>' + (piatto.strMeal || "Piatto") + '</strong>' +
            '<span class="badge text-bg-primary">' + (piatto.strCategory || "Offerta") + '</span>' +
          '</div>' +
          '<p class="mb-1 small text-secondary">' + (restaurant.name || "Ristorante") + '</p>' +
          '<p class="mb-2"><strong>€ ' + Number(piatto.prezzo || 0).toFixed(2) + '</strong></p>' +
          '<a class="btn btn-sm btn-outline-primary" href="menu.html?id=' + (piatto.ristorante_id || "") + '">Vai al menù</a>' +
        '</div>';
        container.appendChild(col);
      });
    }

    async function caricaBachecaOfferte() {
      try {
        var userResponse = await fetchConControlloToken(apiBase + "/users/me");
        if (!userResponse || !userResponse.ok) throw new Error("Impossibile recuperare il profilo utente.");
        var user = await userResponse.json();
        userPreferences = Array.isArray(user.preferenze) ? user.preferenze.filter(Boolean) : [];

        var restaurantsResponse = await fetchConControlloToken(apiBase + "/restaurants");
        if (restaurantsResponse && restaurantsResponse.ok) {
          var restaurantsData = await restaurantsResponse.json();
          var listaRistoranti = Array.isArray(restaurantsData.restaurants) ? restaurantsData.restaurants : [];
          listaRistoranti.forEach(function(r) {
            if (r && r._id) {
              restaurantsById[r._id] = r;
            }
          });
        }

        if (!userPreferences.length) {
          mostraOffertePersonalizzate([]);
          return;
        }

        var offersResponse = await fetchConControlloToken(apiBase + "/meals");
        if (!offersResponse || !offersResponse.ok) throw new Error("Impossibile recuperare le offerte.");
        var offers = await offersResponse.json();

        var offerteUniche = [];
        var visti = new Set();
        (Array.isArray(offers) ? offers : []).forEach(function(p) {
          if (!p || !p._id || visti.has(p._id)) return;
          var tipologia = inferenzaTipologiaPiatto(p);
          if (!tipologia || userPreferences.indexOf(tipologia) === -1) return;
          visti.add(p._id);
          offerteUniche.push(p);
        });

        mostraOffertePersonalizzate(offerteUniche.slice(0, 6));
      } catch (err) {
        console.error("Errore nel caricamento bacheca offerte:", err);
        var container = document.getElementById("offerteContainer");
        container.innerHTML = '<p class="text-danger mb-0">Non è stato possibile caricare le offerte personalizzate.</p>';
      }
    }

    function mostraRistoranti(lista) {
      var container = document.getElementById("ristorantiContainer");
      container.innerHTML = "";
      if (lista.length === 0) {
        container.innerHTML = '<p class="text-muted">Nessun ristorante trovato.</p>';
        return;
      }
      lista.forEach(function(r) {
        var col = document.createElement("div");
        col.className = "col-12 col-md-10 col-lg-6 col-xxl-4";
        col.innerHTML = '<div class="card ristorante-card h-100">' +
                          '<div class="ristorante-photo-wrapper">' +
                            '<img src="' + (r.image || defaultRestaurantImage) + '" class="card-img-top" alt="Foto del ristorante ' + r.name + '" onerror="this.src=\'' + defaultRestaurantImage + '\'">' +
                          '</div>' +
                          '<div class="card-body d-flex flex-column">' +
                            '<h5 class="card-title">' + r.name + '</h5>' +
                            '<p class="card-text">' + (r.address || "Indirizzo non disponibile.") + '</p>' +
                            '<a href="menu.html?id=' + r._id + '" class="btn mt-auto">Vedi Menù</a>' +
                          '</div>' +
                          '</div>';
        container.appendChild(col);
      });
    }

    document.getElementById("searchByName").addEventListener("input", function() {
      ricercaRistoranti(this.value.trim(), document.getElementById("searchByAddress").value.trim());
    });

    document.getElementById("searchByAddress").addEventListener("input", function() {
      ricercaRistoranti(document.getElementById("searchByName").value.trim(), this.value.trim());
    });

    caricaBachecaOfferte();
    ricercaRistoranti("", "");
  </script>
</body>
</html>
